<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1A1A1A">
<title>Elkali German A1</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #1A1A1A; --black-light: #2E2E2E; --cream: #FAF7F0; --cream-dim: #F0EAD9;
    --red: #D32F2F; --red-dark: #A82424; --yellow: #FBC02D; --yellow-dark: #E0A800;
    --text: #2A2620; --text-dim: #6B6457;
  }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  .flag-strip { display: flex; height: 6px; }
  .flag-strip span { flex: 1; }
  .flag-strip .b { background: var(--black); }
  .flag-strip .r { background: var(--red); }
  .flag-strip .y { background: var(--yellow); }
  .hero { background: linear-gradient(165deg, var(--black) 0%, var(--black-light) 100%); color: var(--cream); padding: 30px 20px 26px; position: relative; overflow: hidden; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; position: relative; z-index: 2; }
  .brand-wrap { display: flex; align-items: baseline; gap: 8px; }
  .brand-name { font-size: 30px; font-weight: 800; font-family: Georgia, 'Times New Roman', serif; color: var(--cream); }
  .brand-sub { font-size: 13px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
  .hero .by { font-size: 13px; color: rgba(250,247,240,.6); margin-top: 6px; }
  .student-badge { background: rgba(255,255,255,.08); border: 1.5px solid var(--yellow); border-radius: 14px; padding: 8px 12px; text-align: center; min-width: 64px; }
  .student-badge .num { font-size: 20px; font-weight: 800; color: var(--yellow); }
  .student-badge .lbl { font-size: 9px; color: rgba(250,247,240,.65); margin-top: 2px; }
  .book-strip { display: flex; gap: 3px; position: relative; z-index: 2; margin-top: 6px; }
  .page-tick { flex: 1; height: 24px; border-radius: 3px; background: rgba(255,255,255,.1); }
  .page-tick.done { background: var(--yellow); }
  .progress-caption { font-size: 12px; color: rgba(250,247,240,.7); margin-top: 10px; position: relative; z-index: 2; direction: rtl; }
  .progress-caption strong { color: var(--yellow); }
  .module-nav { display: flex; gap: 8px; padding: 16px 20px 4px; overflow-x: auto; background: var(--cream); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(26,26,26,.08); }
  .module-chip { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--cream-dim); color: var(--text-dim); border: 1.5px solid transparent; transition: .2s; white-space: nowrap; }
  .module-chip.active { background: var(--black); color: var(--yellow); border-color: var(--black); }
  .content { padding: 18px 16px 80px; max-width: 560px; margin: 0 auto; }
  .module-block { margin-bottom: 28px; }
  .module-title { font-size: 13px; font-weight: 800; color: var(--red); letter-spacing: 1px; margin-bottom: 4px; padding: 0 4px; }
  .lesson-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(26,26,26,.07); border: 1px solid rgba(26,26,26,.05); cursor: pointer; transition: transform .15s; }
  .lesson-card:active { transform: scale(.98); }
  .lesson-card.locked { opacity: .5; cursor: default; }
  .lesson-num { width: 46px; height: 46px; border-radius: 12px; background: var(--black); color: var(--yellow); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; font-family: Georgia, serif; }
  .lesson-card.completed .lesson-num { background: var(--red); color: #fff; }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-title-de { font-size: 14px; font-weight: 700; color: var(--black); direction: ltr; text-align: right; line-height: 1.3; }
  .lesson-title-ar { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .lesson-status { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .lesson-status.ready { color: #2E9E5B; }
  .lesson-status.soon { color: var(--text-dim); }
  .lesson-arrow { font-size: 18px; color: var(--text-dim); flex-shrink: 0; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid rgba(26,26,26,.08); display: flex; padding: 8px 0; box-shadow: 0 -4px 20px rgba(26,26,26,.06); z-index: 60; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: var(--text-dim); font-weight: 600; cursor: pointer; background: none; border: none; font-family: inherit; }
  .nav-item.active { color: var(--red); }
  .nav-icon { font-size: 19px; }
  .modal-sheet { position: fixed; bottom: 0; left: 0; right: 0; top: 0; background: var(--cream); z-index: 201; display: none; flex-direction: column; }
  .modal-sheet.show { display: flex; }
  .modal-header { background: var(--black); color: var(--yellow); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 15px; font-weight: 700; }
  .modal-close { background: rgba(255,255,255,.15); border: none; color: var(--cream); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  .modal-body { flex: 1; overflow-y: auto; }
  .modal-body iframe { width: 100%; height: 100%; border: none; }
  .choice-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,.55); z-index: 150; align-items: center; justify-content: center; padding: 20px; }
  .choice-overlay.show { display: flex; }
  .choice-card { background: #fff; border-radius: 18px; padding: 24px 20px; max-width: 340px; width: 100%; text-align: center; border-top: 5px solid var(--yellow); }
  .choice-card h3 { color: var(--black); font-size: 17px; margin-bottom: 4px; }
  .choice-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }
  .choice-btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
  .choice-btn.quiz { background: var(--red); color: #fff; }
  .choice-btn.uebungen { background: var(--black); color: var(--yellow); }
  .choice-btn.cancel { background: var(--cream-dim); color: var(--text-dim); }
</style>
</head>
<body>

<div class="flag-strip"><span class="b"></span><span class="r"></span><span class="y"></span></div>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="brand-wrap"><span class="brand-name">Elkali</span></div>
      <div class="brand-sub">GERMAN A1</div>
      <div class="by">24 Lektionen · Momente A1 · Übungen تفاعلية</div>
    </div>
    <div class="student-badge">
      <div class="num" id="completedCount">0</div>
      <div class="lbl">دروس<br>مكتملة</div>
    </div>
  </div>
  <div class="book-strip" id="bookStrip"></div>
  <div class="progress-caption">استمر في رحلتك نحو <strong>A1 الكاملة</strong> 🇩🇪</div>
</div>

<div class="module-nav" id="moduleNav">
  <div class="module-chip active" data-module="all">الكل</div>
  <div class="module-chip" data-module="1">MODUL 1</div>
  <div class="module-chip" data-module="2">MODUL 2</div>
  <div class="module-chip" data-module="3">MODUL 3</div>
  <div class="module-chip" data-module="4">MODUL 4</div>
  <div class="module-chip" data-module="5">MODUL 5</div>
  <div class="module-chip" data-module="6">MODUL 6</div>
  <div class="module-chip" data-module="7">MODUL 7</div>
  <div class="module-chip" data-module="8">MODUL 8</div>
</div>

<div class="content" id="content"></div>

<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">📚</span> الدروس</button>
  <button class="nav-item"><span class="nav-icon">📖</span> المرجع</button>
  <button class="nav-item"><span class="nav-icon">📊</span> تقدمي</button>
  <button class="nav-item"><span class="nav-icon">ℹ️</span> حول</button>
</div>

<div class="choice-overlay" id="choiceOverlay">
  <div class="choice-card">
    <h3 id="choiceTitle">Lektion</h3>
    <p>اختر النشاط</p>
    <button class="choice-btn quiz" onclick="openContent('quiz')">🎡 الكويز (عجلة الحظ)</button>
    <button class="choice-btn uebungen" onclick="openContent('uebungen')">✏️ التمارين (4 أنواع)</button>
    <button class="choice-btn cancel" onclick="closeChoice()">إلغاء</button>
  </div>
</div>

<div class="modal-sheet" id="modalSheet">
  <div class="modal-header">
    <h2 id="modalTitle">عنوان</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>

<script>
const LESSONS = [
  { n:1,  modul:1, de:"Ich heiße Miriam.",                               ar:"التعارف · التحيات · البلدان · الأبجدية" },
  { n:2,  modul:1, de:"Was macht ihr beruflich?",                        ar:"المهن · الأعداد · الحالة الاجتماعية" },
  { n:3,  modul:1, de:"Das ist meine Schwester.",                       ar:"العائلة · اللغات" },
  { n:4,  modul:2, de:"Das Bild ist so schön.",                         ar:"الأثاث · الأسعار · التقييم" },
  { n:5,  modul:2, de:"Ist das ein Tisch?",                             ar:"الأشياء · المواد · الألوان" },
  { n:6,  modul:2, de:"Wir haben einen Termin.",                        ar:"المكتب · التقنية · الهاتف" },
  { n:7,  modul:3, de:"Sie können super tanzen!",                       ar:"الهوايات · القدرات · التكرار" },
  { n:8,  modul:3, de:"Ich habe leider keine Zeit.",                    ar:"وقت الفراغ · المواعيد · الساعة" },
  { n:9,  modul:3, de:"Ich mag Hamburger.",                             ar:"الأطعمة · المطعم · الأكل" },
  { n:10, modul:4, de:"Wann kommst du denn an?",                        ar:"وسائل النقل · السفر · الأفعال المنفصلة" },
  { n:11, modul:4, de:"Was haben Sie gestern gemacht?",                 ar:"يوميات · الماضي التام مع haben" },
  { n:12, modul:4, de:"Im Frühling bin ich nach Hamburg gefahren.",      ar:"الفصول · الأعياد · الماضي التام مع sein" },
  { n:13, modul:5, de:"Berlin gefällt mir.",                            ar:"أماكن المدينة · es gibt · حالة الجر" },
  { n:14, modul:5, de:"Vor dem Kaufhaus nach rechts.",                  ar:"وصف الطريق · حروف الجر + Dativ" },
  { n:15, modul:5, de:"Ich finde ihr Zimmer schön.",                    ar:"السكن · السكن المشترك · sein/ihr" },
  { n:16, modul:6, de:"Wir haben hier ein Problem.",                    ar:"طلب المساعدة · المواعيد · in/vor/nach" },
  { n:17, modul:6, de:"Ich will … werden.",                             ar:"خطط المهنة · wollen · werden · mit/ohne" },
  { n:18, modul:6, de:"Ich soll diese Übung machen.",                   ar:"الصحة · الجسم · sollen · أمر Sie" },
  { n:19, modul:7, de:"Jetzt sei doch nicht gleich sauer!",             ar:"الأعمال المنزلية · أمر du/ihr · ضمائر Akk." },
  { n:20, modul:7, de:"Das Team sieht sehr sympathisch aus!",           ar:"المظهر · ماضٍ تام لأفعال غير منفصلة" },
  { n:21, modul:7, de:"Darf man das?",                                  ar:"القوانين · müssen/dürfen · صياغة un-" },
  { n:22, modul:8, de:"Mehr, mehr, mehr.",                              ar:"الملابس · المقارنة والتفضيل · welch-/dieser" },
  { n:23, modul:8, de:"Es regnet. Na und?",                            ar:"الطقس · السفر · denn · حروف جر متغيرة" },
  { n:24, modul:8, de:"Der erste Oktober war mein Glückstag!",          ar:"الأعياد · الأعداد الترتيبية · Konjunktiv II" },
];

let activeModule = "all";
let currentLesson = null;

function isReady(n) {
  return typeof CONTENT !== 'undefined' && CONTENT[String(n)] !== undefined;
}

function buildBookStrip() {
  const strip = document.getElementById('bookStrip');
  strip.innerHTML = '';
  LESSONS.forEach(function(l) {
    const tick = document.createElement('div');
    tick.className = 'page-tick' + (isReady(l.n) ? ' done' : '');
    strip.appendChild(tick);
  });
  document.getElementById('completedCount').textContent = LESSONS.filter(function(l){ return isReady(l.n); }).length;
}

function buildLessons() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const modules = [1,2,3,4,5,6,7,8];
  const modulTitles = {
    1: "MODUL 1 — Lektionen 1–3", 2: "MODUL 2 — Lektionen 4–6",
    3: "MODUL 3 — Lektionen 7–9", 4: "MODUL 4 — Lektionen 10–12",
    5: "MODUL 5 — Lektionen 13–15", 6: "MODUL 6 — Lektionen 16–18",
    7: "MODUL 7 — Lektionen 19–21", 8: "MODUL 8 — Lektionen 22–24"
  };

  modules.forEach(function(m) {
    if (activeModule !== "all" && activeModule !== String(m)) return;
    const block = document.createElement('div');
    block.className = 'module-block';
    block.innerHTML = '<div class="module-title">' + modulTitles[m] + '</div>';

    LESSONS.filter(function(l){ return l.modul === m; }).forEach(function(l) {
      const ready = isReady(l.n);
      const card = document.createElement('div');
      card.className = 'lesson-card' + (ready ? ' completed' : ' locked');
      const statusText = ready ? '✅ جاهز — كويز + تمارين' : '🔒 قريباً';
      const statusClass = ready ? 'ready' : 'soon';
      card.innerHTML =
        '<div class="lesson-num">' + l.n + '</div>' +
        '<div class="lesson-info">' +
          '<div class="lesson-title-de">' + l.de + '</div>' +
          '<div class="lesson-title-ar">' + l.ar + '</div>' +
          '<div class="lesson-status ' + statusClass + '">' + statusText + '</div>' +
        '</div>' +
        '<div class="lesson-arrow">' + (ready ? '◀' : '') + '</div>';
      if (ready) card.onclick = function() { openChoice(l); };
      block.appendChild(card);
    });
    content.appendChild(block);
  });
}

function openChoice(lesson) {
  currentLesson = lesson;
  document.getElementById('choiceTitle').textContent = 'Lektion ' + lesson.n + ' — ' + lesson.de;
  document.getElementById('choiceOverlay').classList.add('show');
}
function closeChoice() {
  document.getElementById('choiceOverlay').classList.remove('show');
}

function openContent(type) {
  closeChoice();
  const lessonContent = CONTENT[String(currentLesson.n)];
  if (!lessonContent || !lessonContent[type]) {
    alert('هذا المحتوى غير متوفر بعد لهذا الدرس.');
    return;
  }
  document.getElementById('modalTitle').textContent =
    'Lektion ' + currentLesson.n + ' — ' + (type === 'quiz' ? 'الكويز' : 'التمارين');
  const body = document.getElementById('modalBody');
  body.innerHTML = '<iframe id="contentFrame"></iframe>';
  const frame = document.getElementById('contentFrame');
  frame.srcdoc = lessonContent[type];
  document.getElementById('modalSheet').classList.add('show');
}

function closeModal() {
  document.getElementById('modalSheet').classList.remove('show');
  document.getElementById('modalBody').innerHTML = '';
}

document.getElementById('moduleNav').addEventListener('click', function(e) {
  const chip = e.target.closest('.module-chip');
  if (!chip) return;
  document.querySelectorAll('.module-chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  activeModule = chip.dataset.module;
  buildLessons();
});

const CONTENT = {"1": {"quiz": "<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0\">\n<title>Glücksrad-Quiz — Lektion 1</title>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(180deg, #F7F9FC 0%, #EEF3F9 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 28px 14px; }\n  .wrap { width: 100%; max-width: 480px; }\n  .eyebrow { text-align:center; font-size:13px; color:#2E75B6; font-weight:700; letter-spacing:1px; }\n  h1 { text-align: center; margin: 4px 0 2px; font-size: 26px; color: #1F4E79; font-weight: 800; font-style: italic; transform: skewX(-2deg); }\n  .subtitle { text-align:center; font-size:14px; color:#555; margin-bottom:20px; direction: rtl; }\n  .card { background:#fff; border-radius:20px; padding:30px 24px; text-align:center; box-shadow:0 8px 30px rgba(31,78,121,0.12); }\n  .dots { display:flex; justify-content:center; gap:10px; margin-bottom:18px; }\n  .dot { width:12px; height:12px; border-radius:50%; background:#D8E1EC; border:2px solid transparent; transition:.3s; }\n  .dot.done { background: var(--c); }\n  .dot.active { border-color: var(--c); }\n  .big-emoji { font-size:54px; margin-bottom:6px; }\n  p.lead { color:#666; font-size:15px; line-height:1.7; margin: 14px 0 22px; direction: rtl; }\n  button.primary { background:#1F4E79; color:#fff; border:none; border-radius:14px; padding:14px 34px; font-size:17px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(31,78,121,0.3); transition: transform .15s; }\n  button.primary:active { transform: scale(0.97); }\n  button.spin { background:#7B61C9; color:#fff; border:none; border-radius:14px; padding:14px 34px; font-size:17px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(123,97,201,.35); margin-top:8px; transition: transform .15s; }\n  button.spin:disabled { background:#A9BCCB; box-shadow:none; cursor:default; }\n  button.spin:active:not(:disabled) { transform: scale(0.97); }\n  .wheel-zone { position:relative; width:260px; height:260px; margin:0 auto 8px; }\n  .pointer { position:absolute; top:-13px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:13px solid transparent; border-right:13px solid transparent; border-top:20px solid #7B61C9; z-index:10; filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }\n  svg#wheelSvg { transition: transform 2.8s cubic-bezier(.17,.67,.1,1); filter: drop-shadow(0 6px 18px rgba(31,78,121,.35)); }\n  .legend { display:flex; justify-content:center; gap:14px; margin:14px 0; flex-wrap:wrap; font-size:13px; color:#555; }\n  .legend span.sw { width:10px; height:10px; border-radius:50%; display:inline-block; margin-left:5px; }\n  .score-line { margin-top:14px; font-size:14px; color:#888; }\n  .score-line strong { color:#1F4E79; }\n  .quiz-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }\n  .pill { color:#fff; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:700; }\n  .qcount { font-size:13px; color:#888; }\n  h3.question { color:#1F4E79; font-size:18px; line-height:1.5; margin-bottom:18px; text-align:right; }\n  .opt { display:block; width:100%; background:#F2F6FA; border:2px solid #E2E8F0; border-radius:12px; padding:13px 16px; font-size:15px; color:#1F4E79; text-align:right; direction:rtl; cursor:pointer; margin-bottom:10px; transition:.2s; font-family:inherit; }\n  .opt.correct { background:#E6F4E8; border-color:#2E9E5B; color:#1B6B3A; font-weight:700; }\n  .opt.wrong { background:#FCEAEA; border-color:#D64545; color:#A52E2E; font-weight:700; }\n  .opt:disabled { cursor:default; }\n  .explain { margin-top:14px; background:#F7F9FC; border-right:4px solid #2E75B6; border-radius:8px; padding:12px 14px; font-size:14px; color:#444; line-height:1.6; text-align:right; display:none; }\n  .streak-msg { margin-top:10px; font-size:13px; color:#7B61C9; font-weight:700; text-align:center; display:none; }\n  button.next { margin-top:16px; width:100%; background:#1F4E79; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; display:none; }\n  .result-emoji { font-size:58px; margin-bottom:2px; }\n  h2.result-title { color:#1F4E79; font-size:21px; margin-bottom:6px; }\n  .result-msg { font-size:15px; color:#666; margin-bottom:18px; direction:rtl; }\n  .score-box { background:#F7F9FC; border-radius:16px; padding:18px; margin-bottom:18px; }\n  .score-box .num { font-size:40px; font-weight:800; color:#1F4E79; }\n  .score-box .pct { font-size:14px; color:#888; margin-top:2px; }\n  .score-box .streak { margin-top:12px; font-size:13px; color:#666; }\n  .screen { display:none; }\n  .screen.active { display:block; }\n  footer { text-align:center; margin-top:18px; font-size:12px; color:#A0AAB8; }\n</style>\n</head>\n<body>\n<div class=\"wrap\">\n  <div class=\"eyebrow\">LEKTION 1</div>\n  <h1>Glücksrad-Quiz 🎡</h1>\n  <div class=\"subtitle\">عجلة الحظ — Begrüßung · Vorstellung · Länder · Alphabet</div>\n\n  <div class=\"dots\" id=\"dots\" style=\"display:none;\"></div>\n\n  <div class=\"screen active card\" id=\"screen-start\">\n    <div class=\"big-emoji\">🎡</div>\n    <h2 style=\"color:#1F4E79;font-size:20px;margin-bottom:8px;\">مرحباً بك في كويز الدرس 1!</h2>\n    <p class=\"lead\">أدر عجلة الحظ لتختار فئة أسئلة، أجب بسرعة، واجمع أكبر عدد من النقاط.<br>4 فئات × 5 أسئلة = 20 سؤالاً بانتظارك!</p>\n    <button class=\"primary\" onclick=\"goWheel()\">ابدأ اللعب</button>\n  </div>\n\n  <div class=\"screen card\" id=\"screen-wheel\">\n    <div class=\"wheel-zone\">\n      <div class=\"pointer\"></div>\n      <svg id=\"wheelSvg\" viewBox=\"0 0 200 200\" width=\"260\" height=\"260\"></svg>\n    </div>\n    <div class=\"legend\" id=\"legend\"></div>\n    <button class=\"spin\" id=\"spinBtn\" onclick=\"spinWheel()\">أدر العجلة!</button>\n    <div class=\"score-line\">النقاط الحالية: <strong id=\"liveScore\">0</strong> / <span id=\"liveTotal\">0</span></div>\n  </div>\n\n  <div class=\"screen card\" id=\"screen-quiz\">\n    <div class=\"quiz-top\">\n      <div class=\"pill\" id=\"catPill\"></div>\n      <div class=\"qcount\" id=\"qCount\"></div>\n    </div>\n    <h3 class=\"question\" id=\"qText\"></h3>\n    <div id=\"optsZone\"></div>\n    <div class=\"explain\" id=\"explainBox\"></div>\n    <div class=\"streak-msg\" id=\"streakMsg\"></div>\n    <button class=\"next\" id=\"nextBtn\" onclick=\"nextQuestion()\">السؤال التالي ←</button>\n  </div>\n\n  <div class=\"screen card\" id=\"screen-result\">\n    <div class=\"result-emoji\" id=\"resultEmoji\"></div>\n    <h2 class=\"result-title\" id=\"resultTitle\"></h2>\n    <div class=\"result-msg\" id=\"resultMsg\"></div>\n    <div class=\"score-box\">\n      <div class=\"num\" id=\"finalScore\"></div>\n      <div class=\"pct\" id=\"finalPct\"></div>\n      <div class=\"streak\">🔥 أفضل متتالية: <strong id=\"finalStreak\"></strong></div>\n    </div>\n    <div id=\"grade-box\" style=\"margin:14px 0;padding:16px;border-radius:14px;font-size:22px;font-weight:800;text-align:center;\"></div>\n    <div id=\"share-score\" style=\"background:#F2F6FA;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#555;direction:rtl;display:none;\">\n      <div style=\"font-weight:700;color:#1F4E79;margin-bottom:6px;\">📋 نتيجتك للمشاركة مع الأستاذ:</div>\n      <div id=\"share-text\" style=\"font-family:monospace;font-size:13px;background:#fff;padding:8px;border-radius:8px;direction:ltr;\"></div>\n      <button onclick=\"copyScore()\" style=\"margin-top:8px;width:100%;background:#1F4E79;color:#fff;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;\">📋 انسخ النتيجة</button>\n      <div id=\"copy-done\" style=\"text-align:center;color:#1B6B3A;font-size:13px;margin-top:6px;display:none;\">✅ تم النسخ!</div>\n    </div>\n    <button class=\"primary\" style=\"background:#7B61C9;box-shadow:0 4px 14px rgba(123,97,201,.3);\" onclick=\"restart()\">العب مرة أخرى 🎡</button>\n  </div>\n\n  <footer>Momente A1 · Lektion 1 — Ich heiße Miriam.</footer>\n</div>\n\n<script>\nconst CATEGORIES = [\n  { id:\"vorstellung\", label:\"Vorstellung\", color:\"#1F4E79\", emoji:\"🙋\" },\n  { id:\"befinden\", label:\"Befinden\", color:\"#2E75B6\", emoji:\"😊\" },\n  { id:\"laender2\", label:\"Länder\", color:\"#7B61C9\", emoji:\"🗺️\" },\n  { id:\"substantive\", label:\"Substantive\", color:\"#B45309\", emoji:\"📚\" },\n];\n\nconst QUESTIONS = {\n  vorstellung: [\n    { q:\"„Darf ich vorstellen?“ bedeutet:\", options:[\"هل تسمح لي بالمغادرة؟\",\"هل تسمح لي بالتقديم؟\",\"هل تسمح لي بالسؤال؟\",\"هل تسمح لي بالانتظار؟\"], correct:1, explain:\"Darf ich vorstellen? = هل تسمح لي بالتقديم؟ تُستخدم لتقديم شخص لآخر.\" },\n    { q:\"„Das ist mein Freund Tom.“ — was bedeutet das?\", options:[\"هذا أخي توم\",\"هذا صديقي توم\",\"هذا والدي توم\",\"هذا معلمي توم\"], correct:1, explain:\"mein Freund = صديقي (للذكر). meine Freundin = صديقتي (للأنثى).\" },\n    { q:\"Wie fragt man nach dem Namen FORMELL?\", options:[\"Wie heißt du?\",\"Wie ist Ihr Name?\",\"Wer bist du?\",\"Was machst du?\"], correct:1, explain:\"Wie ist Ihr Name? هي الصيغة الرسمية (Sie) للسؤال عن الاسم.\" },\n    { q:\"„Er kommt aus der Schweiz.“ — „er“ bezieht sich auf:\", options:[\"امرأة\",\"رجل\",\"مكان\",\"شيء\"], correct:1, explain:\"er = هو (ضمير المذكر)، يُستخدم للإشارة إلى رجل ذُكر سابقاً.\" },\n    { q:\"Was antwortet man auf „Wie heißt du?“\", options:[\"Ich komme aus Berlin.\",\"Ich bin 20 Jahre alt.\",\"Ich heiße Sara.\",\"Ich wohne hier.\"], correct:2, explain:\"Wie heißt du? يسأل عن الاسم، والجواب: Ich heiße + الاسم.\" },\n  ],\n  befinden: [\n    { q:\"„Wie geht es Ihnen?“ ist:\", options:[\"informell (du)\",\"formell (Sie)\",\"فقط للأطفال\",\"فقط بالهاتف\"], correct:1, explain:\"Wie geht es Ihnen? هي الصيغة الرسمية (مع Sie)، بعكس Wie geht's? غير الرسمية.\" },\n    { q:\"„Nicht so gut.“ bedeutet:\", options:[\"جيد جداً\",\"ممتاز\",\"لست بخير كثيراً\",\"لا أعرف\"], correct:2, explain:\"Nicht so gut. = لست بخير كثيراً، إجابة سلبية معتدلة.\" },\n    { q:\"„Und Ihnen?“ — wann benutzt man das?\", options:[\"بعد سؤال غير رسمي فقط\",\"لإعادة السؤال بطريقة رسمية\",\"فقط في الصباح\",\"فقط عند الوداع\"], correct:1, explain:\"Und Ihnen? = وأنت؟ (رسمية)، تُقال لإعادة نفس السؤال على الطرف الآخر.\" },\n    { q:\"Welche Antwort ist die positivste?\", options:[\"Es geht so.\",\"Nicht so gut.\",\"Super!\",\"Geht so.\"], correct:2, explain:\"Super! هي الأكثر إيجابية وحماساً بين الإجابات الأربع.\" },\n    { q:\"„Und dir?“ ist die informelle Form von:\", options:[\"Und Sie?\",\"Und Ihnen?\",\"Und du?\",\"Und ihr?\"], correct:1, explain:\"Und dir? (غير رسمية) = Und Ihnen? (رسمية) — كلاهما يعني 'وأنت؟'.\" },\n  ],\n  laender2: [\n    { q:\"Welches Land spricht „Persisch“?\", options:[\"die Türkei\",\"der Iran\",\"Ägypten\",\"Marokko\"], correct:1, explain:\"Persisch (الفارسية) هي اللغة الرسمية في إيران (der Iran).\" },\n    { q:\"„im Iran“ — warum „im“ und nicht „in“?\", options:[\"خطأ نحوي\",\"der Iran من الاستثناءات (يحتاج أداة)\",\"كل البلدان تأخذ im\",\"فقط مع آسيا\"], correct:1, explain:\"der Iran (مذكر) من استثناءات أسماء البلدان: im Iran = in dem Iran.\" },\n    { q:\"Was spricht man in Marokko als Muttersprachen?\", options:[\"Nur Französisch\",\"Arabisch und Tamazight\",\"Nur Englisch\",\"Spanisch und Französisch\"], correct:1, explain:\"في المغرب: العربية والأمازيغية هما اللغتان الأصليتان.\" },\n    { q:\"Wie heißt die Frau aus Polen?\", options:[\"die Polnerin\",\"die Polin\",\"die Polische\",\"die Polländerin\"], correct:1, explain:\"der Pole / die Polin = البولندي/ة.\" },\n    { q:\"Was ist die Hauptstadt von Tunesien?\", options:[\"Casablanca\",\"Tunis\",\"Algier\",\"Tripoli\"], correct:1, explain:\"Tunis هي عاصمة تونس.\" },\n  ],\n  substantive: [\n    { q:\"Was bedeutet „der Nachname“?\", options:[\"الاسم الأول\",\"اسم العائلة\",\"اسم الشهرة\",\"اسم الدولة\"], correct:1, explain:\"der Nachname = der Familienname = اسم العائلة، بعكس der Vorname (الاسم الأول).\" },\n    { q:\"„die Herkunft“ bedeutet:\", options:[\"الوجهة\",\"الأصل / المنشأ\",\"اللغة\",\"الجنسية\"], correct:1, explain:\"die Herkunft = الأصل، من أين أتى شخص ما.\" },\n    { q:\"Welches Wort ist Neutrum (das)?\", options:[\"die Stadt\",\"der Kurs\",\"das Land\",\"die Sprache\"], correct:2, explain:\"das Land (البلد) هو الكلمة المحايدة الوحيدة في هذه القائمة.\" },\n    { q:\"Was ist „der Wohnort“?\", options:[\"مكان العمل\",\"مكان السكن\",\"مكان الولادة\",\"مكان الدراسة\"], correct:1, explain:\"der Wohnort = مكان السكن الحالي.\" },\n    { q:\"„die Begrüßung“ ≠ „die Verabschiedung“ — der Unterschied ist:\", options:[\"لا فرق\",\"التحية ≠ الوداع\",\"كلاهما تحية\",\"كلاهما وداع\"], correct:1, explain:\"die Begrüßung = التحية (عند اللقاء)، die Verabschiedung = الوداع (عند الفراق).\" },\n  ],\n};\n\nlet rotation = 0, spinning = false, activeCategory = null, qIndex = 0, selected = null;\nlet score = 0, totalAnswered = 0, completedCategories = [], streak = 0, bestStreak = 0;\n\nfunction show(id){\n  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));\n  document.getElementById(id).classList.add('active');\n}\n\nfunction buildWheel(){\n  const svg = document.getElementById('wheelSvg');\n  const n = CATEGORIES.length, seg = 360/n, r = 96, cx=100, cy=100;\n  let html = '';\n  CATEGORIES.forEach((cat,i)=>{\n    const start = i*seg, end = start+seg;\n    const x1 = cx + r*Math.cos(Math.PI*(start-90)/180);\n    const y1 = cy + r*Math.sin(Math.PI*(start-90)/180);\n    const x2 = cx + r*Math.cos(Math.PI*(end-90)/180);\n    const y2 = cy + r*Math.sin(Math.PI*(end-90)/180);\n    const mid = start + seg/2;\n    const lx = cx + (r*0.62)*Math.cos(Math.PI*(mid-90)/180);\n    const ly = cy + (r*0.62)*Math.sin(Math.PI*(mid-90)/180);\n    html += `<path d=\"M${cx},${cy} L${x1},${y1} A${r},${r} 0 0,1 ${x2},${y2} Z\" fill=\"${cat.color}\" stroke=\"#fff\" stroke-width=\"2\"/>`;\n    html += `<text x=\"${lx}\" y=\"${ly}\" fill=\"#fff\" font-size=\"11\" font-weight=\"700\" text-anchor=\"middle\" transform=\"rotate(${mid}, ${lx}, ${ly})\" style=\"font-family:Arial,sans-serif\">${cat.emoji}</text>`;\n  });\n  html += `<circle cx=\"100\" cy=\"100\" r=\"20\" fill=\"#F7F9FC\" stroke=\"#1F4E79\" stroke-width=\"3\"/>`;\n  svg.innerHTML = html;\n\n  document.getElementById('legend').innerHTML = CATEGORIES.map(c=>\n    `<span><span class=\"sw\" style=\"background:${c.color};opacity:${completedCategories.includes(c.id)?0.35:1}\"></span>${c.label} ${completedCategories.includes(c.id)?'✓':''}</span>`\n  ).join('');\n}\n\nfunction buildDots(){\n  document.getElementById('dots').innerHTML = CATEGORIES.map(c=>{\n    const done = completedCategories.includes(c.id);\n    const act = activeCategory===c.id;\n    return `<span class=\"dot ${done?'done':''} ${act?'active':''}\" style=\"--c:${c.color}\"></span>`;\n  }).join('');\n}\n\nfunction goWheel(){\n  document.getElementById('dots').style.display='flex';\n  buildDots();\n  buildWheel();\n  show('screen-wheel');\n}\n\nfunction spinWheel(){\n  if(spinning) return;\n  spinning = true;\n  document.getElementById('spinBtn').disabled = true;\n  document.getElementById('spinBtn').textContent = '🎡 ...';\n\n  const remaining = CATEGORIES.filter(c=>!completedCategories.includes(c.id));\n  const pool = remaining.length>0 ? remaining : CATEGORIES;\n  const chosen = pool[Math.floor(Math.random()*pool.length)];\n  const idx = CATEGORIES.findIndex(c=>c.id===chosen.id);\n  const seg = 360/CATEGORIES.length;\n  const targetMid = idx*seg + seg/2;\n  const extraSpins = 4*360;\n  rotation = rotation - (rotation % 360) + extraSpins + (360 - targetMid);\n  document.getElementById('wheelSvg').style.transform = `rotate(${rotation}deg)`;\n\n  setTimeout(()=>{\n    spinning = false;\n    document.getElementById('spinBtn').disabled = false;\n    document.getElementById('spinBtn').textContent = 'أدر العجلة!';\n    activeCategory = chosen.id;\n    qIndex = 0;\n    selected = null;\n    loadQuestion();\n    show('screen-quiz');\n  }, 2900);\n}\n\nfunction loadQuestion(){\n  buildDots();\n  const cat = CATEGORIES.find(c=>c.id===activeCategory);\n  const q = QUESTIONS[activeCategory][qIndex];\n  document.getElementById('catPill').style.background = cat.color;\n  document.getElementById('catPill').textContent = `${cat.emoji} ${cat.label}`;\n  document.getElementById('qCount').textContent = `${qIndex+1} / ${QUESTIONS[activeCategory].length}`;\n  document.getElementById('qText').textContent = q.q;\n\n  const zone = document.getElementById('optsZone');\n  zone.innerHTML = '';\n  q.options.forEach((opt,i)=>{\n    const btn = document.createElement('button');\n    btn.className = 'opt';\n    btn.textContent = opt;\n    btn.onclick = ()=>answer(i);\n    zone.appendChild(btn);\n  });\n\n  document.getElementById('explainBox').style.display='none';\n  document.getElementById('streakMsg').style.display='none';\n  document.getElementById('nextBtn').style.display='none';\n  selected = null;\n}\n\nfunction answer(idx){\n  if(selected !== null) return;\n  selected = idx;\n  const q = QUESTIONS[activeCategory][qIndex];\n  const correct = q.correct === idx;\n  totalAnswered++;\n\n  const opts = document.querySelectorAll('.opt');\n  opts.forEach((btn,i)=>{\n    btn.disabled = true;\n    if(i === q.correct){ btn.classList.add('correct'); btn.textContent += ' ✓'; }\n    else if(i === idx){ btn.classList.add('wrong'); btn.textContent += ' ✗'; }\n  });\n\n  if(correct){\n    score++;\n    streak++;\n    bestStreak = Math.max(bestStreak, streak);\n    if(streak>=3){\n      const sm = document.getElementById('streakMsg');\n      sm.textContent = `🔥 متتالية ${streak} إجابات صحيحة!`;\n      sm.style.display='block';\n    }\n  } else {\n    streak = 0;\n  }\n\n  const eb = document.getElementById('explainBox');\n  eb.textContent = `💡 ${q.explain}`;\n  eb.style.display = 'block';\n\n  document.getElementById('nextBtn').style.display='block';\n  document.getElementById('nextBtn').textContent = (qIndex+1 < QUESTIONS[activeCategory].length) ? 'السؤال التالي ←' : 'إنهاء الفئة ←';\n\n  document.getElementById('liveScore').textContent = score;\n  document.getElementById('liveTotal').textContent = totalAnswered;\n}\n\nfunction nextQuestion(){\n  const qs = QUESTIONS[activeCategory];\n  if(qIndex+1 < qs.length){\n    qIndex++;\n    loadQuestion();\n  } else {\n    if(!completedCategories.includes(activeCategory)) completedCategories.push(activeCategory);\n    if(completedCategories.length >= CATEGORIES.length){\n      showResult();\n    } else {\n      goWheel();\n    }\n  }\n}\n\nfunction showResult(){\n  const totalQuestions = Object.values(QUESTIONS).reduce((a,q)=>a+q.length,0);\n  const pct = totalAnswered>0 ? Math.round((score/totalAnswered)*100) : 0;\n\n  document.getElementById('resultEmoji').textContent = pct>=80 ? '🏆' : pct>=50 ? '👍' : '💪';\n  document.getElementById('resultTitle').textContent = pct>=80 ? 'Ausgezeichnet!' : pct>=50 ? 'Gut gemacht!' : 'Weiter üben!';\n  document.getElementById('resultMsg').textContent = pct>=80\n    ? 'ممتاز جداً! أنت تتحكم بالتعارف والتحيات والبلدان بثقة.'\n    : pct>=50 ? 'أداء جيد! راجع التفسيرات أعلاه لتثبيت ما تبقى.'\n    : 'ابدأ من جديد وراجع المرجع — ستتحسن بسرعة!';\n  document.getElementById('finalScore').textContent = `${score} / ${totalQuestions}`;\n  document.getElementById('finalPct').textContent = `${pct}% صحيح`;\n  document.getElementById('finalStreak').textContent = bestStreak;\n\n  let grade, gradeColor, gradeBg;\n  if(pct >= 90)      { grade = 'ممتاز — Sehr gut  (A)'; gradeColor='#1B6B3A'; gradeBg='#E6F4E8'; }\n  else if(pct >= 75) { grade = 'جيد جداً — Gut  (B)'; gradeColor='#1F4E79'; gradeBg='#EEF3F9'; }\n  else if(pct >= 60) { grade = 'جيد — Befriedigend  (C)'; gradeColor='#B45309'; gradeBg='#FFF8EC'; }\n  else if(pct >= 50) { grade = 'مقبول — Ausreichend  (D)'; gradeColor='#7C5A00'; gradeBg='#FFFBEB'; }\n  else               { grade = 'راجع الدرس — Nicht bestanden  (F)'; gradeColor='#A52E2E'; gradeBg='#FCEAEA'; }\n\n  const gradeBox = document.getElementById('grade-box');\n  gradeBox.textContent = grade;\n  gradeBox.style.color = gradeColor;\n  gradeBox.style.background = gradeBg;\n\n  const now = new Date();\n  const dateStr = now.toLocaleDateString('ar-DZ');\n  const shareText = `Lektion 1 Quiz | النتيجة: ${score}/${totalQuestions} (${pct}%) | التقدير: ${grade.split('—')[0].trim()} | التاريخ: ${dateStr}`;\n  document.getElementById('share-text').textContent = shareText;\n  document.getElementById('share-score').style.display = 'block';\n\n  document.getElementById('dots').style.display='none';\n  show('screen-result');\n}\n\nfunction copyScore() {\n  const text = document.getElementById('share-text').textContent;\n  if(navigator.clipboard) {\n    navigator.clipboard.writeText(text).then(() => {\n      document.getElementById('copy-done').style.display = 'block';\n      setTimeout(() => document.getElementById('copy-done').style.display='none', 2000);\n    });\n  } else {\n    const ta = document.createElement('textarea');\n    ta.value = text; document.body.appendChild(ta);\n    ta.select(); document.execCommand('copy');\n    document.body.removeChild(ta);\n    document.getElementById('copy-done').style.display = 'block';\n    setTimeout(() => document.getElementById('copy-done').style.display='none', 2000);\n  }\n}\n\nfunction restart(){\n  rotation = 0; activeCategory = null; qIndex = 0; selected = null;\n  score = 0; totalAnswered = 0; completedCategories = []; streak = 0; bestStreak = 0;\n  document.getElementById('wheelSvg').style.transition = 'none';\n  document.getElementById('wheelSvg').style.transform = 'rotate(0deg)';\n  setTimeout(()=>{ document.getElementById('wheelSvg').style.transition = 'transform 2.8s cubic-bezier(.17,.67,.1,1)'; }, 50);\n  document.getElementById('liveScore').textContent = 0;\n  document.getElementById('liveTotal').textContent = 0;\n  document.getElementById('dots').style.display='none';\n  show('screen-start');\n}\n<\/script>\n</body>\n</html>\n", "uebungen": "<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0\">\n<title>Übungen — Lektion 1</title>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #F7F9FC; min-height: 100vh; }\n  .header { background: linear-gradient(135deg, #1F4E79, #7B61C9); color: #fff; text-align: center; padding: 28px 16px 20px; }\n  .header .eyebrow { font-size: 12px; letter-spacing: 2px; opacity: .7; margin-bottom: 6px; }\n  .header h1 { font-size: 24px; font-weight: 800; }\n  .header p { font-size: 14px; opacity: .8; margin-top: 6px; }\n  .tabs { display: flex; background: #fff; box-shadow: 0 2px 8px rgba(31,78,121,.1); overflow-x: auto; position: sticky; top: 0; z-index: 100; }\n  .tab { flex: 1; min-width: 80px; padding: 14px 8px; text-align: center; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: .2s; white-space: nowrap; }\n  .tab.active { color: #1F4E79; border-bottom-color: #1F4E79; }\n  .tab .tab-icon { font-size: 18px; display: block; margin-bottom: 3px; }\n  .section { display: none; padding: 20px 14px 60px; max-width: 560px; margin: 0 auto; }\n  .section.active { display: block; }\n  .sec-title { font-size: 18px; font-weight: 800; color: #1F4E79; margin-bottom: 4px; }\n  .sec-sub { font-size: 13px; color: #888; margin-bottom: 20px; direction: rtl; }\n  .score-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 12px; padding: 10px 14px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(31,78,121,.07); font-size: 13px; color: #555; }\n  .score-bar strong { color: #1F4E79; font-size: 16px; }\n  .ex-card { background: #fff; border-radius: 14px; padding: 18px 16px; margin-bottom: 14px; box-shadow: 0 2px 10px rgba(31,78,121,.07); }\n  .ex-card .q-num { font-size: 11px; color: #2E75B6; font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }\n  .ex-card .q-text { font-size: 16px; color: #1F4E79; font-weight: 600; line-height: 1.5; margin-bottom: 14px; }\n  .blank-input { border: 2px solid #D8E4F0; border-radius: 8px; padding: 10px 12px; font-size: 15px; width: 100%; font-family: inherit; color: #1F4E79; direction: ltr; text-align: left; transition: .2s; }\n  .blank-input:focus { outline: none; border-color: #7B61C9; }\n  .blank-input.correct { border-color: #2E9E5B; background: #E6F4E8; color: #1B6B3A; }\n  .blank-input.wrong { border-color: #D64545; background: #FCEAEA; color: #A52E2E; }\n  .hint-btn { margin-top: 8px; background: none; border: 1px solid #D8E4F0; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: #888; cursor: pointer; font-family: inherit; }\n  .hint-btn:hover { border-color: #7B61C9; color: #7B61C9; }\n  .feedback-text { margin-top: 8px; font-size: 13px; display: none; direction: rtl; line-height: 1.5; }\n  .feedback-text.ok { color: #1B6B3A; }\n  .feedback-text.err { color: #A52E2E; }\n  .check-btn { margin-top: 10px; width: 100%; background: #1F4E79; color: #fff; border: none; border-radius: 10px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; transition: .15s; }\n  .check-btn:hover { background: #17406A; }\n  .check-btn:active { transform: scale(.98); }\n  .match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }\n  .match-col { display: flex; flex-direction: column; gap: 8px; }\n  .match-item { background: #F2F6FA; border: 2px solid #D8E4F0; border-radius: 10px; padding: 10px 12px; font-size: 14px; color: #1F4E79; cursor: pointer; transition: .2s; font-family: inherit; text-align: center; font-weight: 600; min-height: eedback-text\" id=\"fb1\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 2 — Befinden</div>\n    <div class=\"q-text\">Wie geht es dir? — ___, danke! (ممتاز)</div>\n    <input class=\"blank-input\" id=\"f2\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h2')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h2\">التلميح: كلمة إنجليزية الأصل تعني رائع</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f2','Super','fb2','Super! = ممتاز/رائع')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb2\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 3 — Länder</div>\n    <div class=\"q-text\">Der Mann aus Spanien heißt: der ___.</div>\n    <input class=\"blank-input\" id=\"f3\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h3')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h3\">التلميح: قريب من Spanien</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f3','Spanier','fb3','der Spanier / die Spanierin = الإسباني/ة.')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb3\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 4 — Vorstellung</div>\n    <div class=\"q-text\">___ kommst du? — Ich komme aus Marokko.</div>\n    <input class=\"blank-input\" id=\"f4\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h4')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h4\">التلميح: من أين (غير رسمية، du)</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f4','Woher','fb4','Woher kommst du? = من أين أتيت؟')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb4\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 5 — Alphabet</div>\n    <div class=\"q-text\">Der Buchstabe „Q“ heißt auf Deutsch: ___.</div>\n    <input class=\"blank-input\" id=\"f5\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h5')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h5\">التلميح: يُكتب Qu</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f5','Qu','fb5','حرف Q يُنطق Qu بالألمانية.')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb5\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 6 — Vorstellung</div>\n    <div class=\"q-text\">Freut mich, dich ___! (kennenzulernen)</div>\n    <input class=\"blank-input\" id=\"f6\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h6')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h6\">التلميح: الفعل المطلوب نفسه</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f6','kennenzulernen','fb6','Freut mich, dich kennenzulernen! = سررت بمعرفتك!')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb6\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 7 — Substantive</div>\n    <div class=\"q-text\">Mein ___ ist Ahmed, mein Nachname ist Kali.</div>\n    <input class=\"blank-input\" id=\"f7\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h7')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h7\">التلميح: عكس Nachname</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f7','Vorname','fb7','der Vorname = الاسم الأول')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb7\"></div>\n  </div>\n\n  <div class=\"ex-card\">\n    <div class=\"q-num\">سؤال 8 — Begrüßung</div>\n    <div class=\"q-text\">عند الوداع بالهاتف فقط نقول: Auf ___!</div>\n    <input class=\"blank-input\" id=\"f8\" placeholder=\"أكمل الفراغ...\" autocomplete=\"off\" autocorrect=\"off\" spellcheck=\"false\">\n    <button class=\"hint-btn\" onclick=\"showHint('h8')\">💡 تلميح</button>\n    <div class=\"feedback-text\" id=\"h8\">التلميح: يتعلق بالسمع (hören)</div>\n    <button class=\"check-btn\" onclick=\"checkFill('f8','Wiederhören','fb8','Auf Wiederhören! تُستخدم بالهاتف فقط')\">تحقق ✓</button>\n    <div class=\"feedback-text\" id=\"fb8\"></div>\n  </div>\n\n  <button class=\"reset-btn\" onclick=\"resetFill()\">🔄 إعادة التمرين</button>\n</div>\n\n<div class=\"section\" id=\"sec-match\">\n  <div class=\"sec-title\">🔗 مطابقة</div>\n  <div class=\"sec-sub\">اضغط على كلمة ألمانية ثم على ترجمتها العربية</div>\n  <div class=\"score-bar\"><span>المطابقات</span><strong id=\"match-score\">0 / 8</strong></div>\n  <div class=\"progress-wrap\">\n    <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" id=\"match-progress\" style=\"width:0%\"></div></div>\n    <div class=\"progress-label\" id=\"match-progress-label\">0 من 8 مطابقة</div>\n  </div>\n  <div class=\"match-grid\">\n    <div class=\"match-col\" id=\"match-left\"></div>\n    <div class=\"match-col\" id=\"match-right\"></div>\n  </div>\n  <div id=\"match-msg\" style=\"text-align:center;font-size:14px;color:#888;margin:10px 0;\"></div>\n  <button class=\"reset-btn\" onclick=\"resetMatch()\">🔄 إعادة المطابقة</button>\n</div>\n\n<div class=\"section\" id=\"sec-order\">\n  <div class=\"sec-title\">🔀 ترتيب الجملة</div>\n  <div class=\"sec-sub\">اضغط على الكلمات بالترتيب الصحيح لبناء الجملة</div>\n  <div class=\"score-bar\"><span>النقاط</span><strong id=\"order-score\">0 / 6</strong></div>\n  <div class=\"progress-wrap\">\n    <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" id=\"order-progress\" style=\"width:0%\"></div></div>\n    <div class=\"progress-label\" id=\"order-progress-label\">0 من 6 مكتملة</div>\n  </div>\n  <div id=\"order-container\"></div>\n  <button class=\"reset-btn\" onclick=\"resetOrder()\">🔄 إعادة الترتيب</button>\n</div>\n\n<div class=\"section\" id=\"sec-quiz\">\n  <div class=\"sec-title\">🎯 اختيار متعدد</div>\n  <div class=\"sec-sub\">اختر الإجابة الصحيحة — نتيجة فورية مع تفسير</div>\n  <div class=\"score-bar\"><span>النقاط</span><strong id=\"quiz-score\">0 / 6</strong></div>\n  <div class=\"progress-wrap\">\n    <div class=\"progress-bar-bg\"><div class=\"progress-bar-fill\" id=\"quiz-progress\" style=\"width:0%\"></div></div>\n    <div class=\"progress-label\" id=\"quiz-progress-label\">0 من 6 مكتملة</div>\n  </div>\n  <div id=\"quiz-container\"></div>\n  <button class=\"reset-btn\" onclick=\"resetQuiz()\">🔄 إعادة الاختيار المتعدد</button>\n</div>\n\n<script>\nfunction switchTab(id) {\n  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));\n  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));\n  event.currentTarget.classList.add('active');\n  document.getElementById('sec-' + id).classList.add('active');\n}\n\nlet fillScores = {};\n\nfunction showHint(id) {\n  const el = document.getElementById(id);\n  el.style.display = 'block';\n  el.classList.add('ok');\n}\n\nfunction checkFill(inputId, answer, fbId, explanation) {\n  const input = document.getElementById(inputId);\n  const fb = document.getElementById(fbId);\n  const val = input.value.trim();\n  const correct = val.toLowerCase() === answer.toLowerCase();\n\n  input.classList.remove('correct','wrong');\n  input.classList.add(correct ? 'correct' : 'wrong');\n  input.disabled = correct;\n\n  fb.style.display = 'block';\n  fb.className = 'feedback-text ' + (correct ? 'ok' : 'err');\n  fb.textContent = correct ? '✅ صحيح! ' + explanation : '❌ الإجابة الصحيحة: ' + answer + ' — ' + explanation;\n\n  if(correct && !fillScores[inputId]) {\n    fillScores[inputId] = true;\n    updateFillScore();\n  }\n}\n\nfunction updateFillScore() {\n  const s = Object.keys(fillScores).length;\n  document.getElementById('fill-score').textContent = s + ' / 8';\n  document.getElementById('fill-progress').style.width = (s/8*100) + '%';\n  document.getElementById('fill-progress-label').textContent = s + ' من 8 مكتملة';\n}\n\nfunction resetFill() {\n  fillScores = {};\n  ['f1','f2','f3','f4','f5','f6','f7','f8'].forEach(id => {\n    const el = document.getElementById(id);\n    el.value = ''; el.disabled = false;\n    el.classList.remove('correct','wrong');\n  });\n  ['fb1','fb2','fb3','fb4','fb5','fb6','fb7','fb8','h1','h2','h3','h4','h5','h6','h7','h8'].forEach(id => {\n    const el = document.getElementById(id);\n    if(el) el.style.display = 'none';\n  });\n  updateFillScore();\n}\n\nconst MATCH_PAIRS = [\n  { de: \"der Vorname\", ar: \"الاسم الأول\" },\n  { de: \"der Nachname\", ar: \"اسم العائلة\" },\n  { de: \"die Herkunft\", ar: \"الأصل / المنشأ\" },\n  { de: \"Darf ich vorstellen?\", ar: \"هل تسمح لي بالتقديم؟\" },\n  { de: \"Es geht so.\", ar: \"لا بأس\" },\n  { de: \"Grüß Gott!\", ar: \"أهلاً (جنوب ألمانيا)\" },\n  { de: \"der Buchstabe\", ar: \"الحرف\" },\n  { de: \"Bis bald!\", ar: \"إلى اللقاء قريباً!\" },\n];\n\nlet matchSelected = null;\nlet matchedPairs = 0;\n\nfunction shuffle(arr) {\n  const a = [...arr];\n  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}\n  return a;\n}\n\nfunction buildMatch() {\n  matchSelected = null; matchedPairs = 0;\n  const left = document.getElementById('match-left');\n  const right = document.getElementById('match-right');\n  left.innerHTML = ''; right.innerHTML = '';\n\n  const leftItems = shuffle(MATCH_PAIRS.map(p=>p.de));\n  const rightItems = shuffle(MATCH_PAIRS.map(p=>p.ar));\n\n  leftItems.forEach(de => {\n    const btn = document.createElement('button');\n    btn.className = 'match-item';\n    btn.textContent = de;\n    btn.dataset.key = de;\n    btn.dataset.side = 'left';\n    btn.onclick = () => handleMatch(btn);\n    left.appendChild(btn);\n  });\n\n  rightItems.forEach(ar => {\n    const pair = MATCH_PAIRS.find(p=>p.ar===ar);\n    const btn = document.createElement('button');\n    btn.className = 'match-item arabic';\n    btn.textContent = ar;\n    btn.dataset.key = pair.de;\n    btn.dataset.side = 'right';\n    btn.onclick = () => handleMatch(btn);\n    right.appendChild(btn);\n  });\n\n  document.getElementById('match-score').textContent = '0 / 8';\n  document.getElementById('match-progress').style.width = '0%';\n  document.getElementById('match-progress-label').textContent = '0 من 8 مطابقة';\n  document.getElementById('match-msg').textContent = '';\n}\n\nfunction handleMatch(btn) {\n  if(btn.classList.contains('matched')) return;\n\n  if(!matchSelected) {\n    matchSelected = btn;\n    btn.classList.add('selected');\n    return;\n  }\n\n  if(matchSelected === btn) {\n    btn.classList.remove('selected');\n    matchSelected = null;\n    return;\n  }\n\n  if(matchSelected.dataset.side === btn.dataset.side) {\n    matchSelected.classList.remove('selected');\n    matchSelected = btn;\n    document.querySelectorAll('.match-item.selected').forEach(b=>b.classList.remove('selected'));\n    btn.classList.add('selected');\n    return;\n  }\n\n  const match = matchSelected.dataset.key === btn.dataset.key;\n\n  if(match) {\n    [matchSelected, btn].forEach(b => {\n      b.classList.remove('selected');\n      b.classList.add('matched');\n    });\n    matchedPairs++;\n    document.getElementById('match-score').textContent = matchedPairs + ' / 8';\n    document.getElementById('match-progress').style.width = (matchedPairs/8*100) + '%';\n    document.getElementById('match-progress-label').textContent = matchedPairs + ' من 8 مطابقة';\n    if(matchedPairs === 8) {\n      document.getElementById('match-msg').textContent = '🏆 أحسنت! طابقت كل الأزواج!';\n      document.getElementById('match-msg').style.color = '#1B6B3A';\n    }\n  } else {\n    [matchSelected, btn].forEach(b => b.classList.add('wrong-flash'));\n    setTimeout(() => {\n      [matchSelected, btn].forEach(b => b.classList.remove('wrong-flash','selected'));\n    }, 600);\n  }\n  matchSelected = null;\n}\n\nfunction resetMatch() { buildMatch(); }\n\nconst ORDER_SENTENCES = [\n  { words: [\"Ich\",\"komme\",\"aus\",\"Marokko\",\".\"], ar: \"أنا من المغرب.\" },\n  { words: [\"Wie\",\"ist\",\"Ihr\",\"Name\",\"?\"], ar: \"ما اسمك؟ (رسمية)\" },\n  { words: [\"Wo\",\"wohnen\",\"Sie\",\"?\"], ar: \"أين تسكن؟\" },\n  { words: [\"Darf\",\"ich\",\"vorstellen\",\"?\"], ar: \"هل تسمح لي بالتقديم؟\" },\n  { words: [\"Entschuldigung\",\",\",\"wie\",\"bitte\",\"?\"], ar: \"عذراً، ماذا قلت؟\" },\n  { words: [\"Schönen\",\"Tag\",\"noch\",\"!\"], ar: \"يوماً سعيداً!\" },\n];\n\nlet orderAnswers = [];\nlet orderScores = {};\n\nfunction buildOrder() {\n  orderAnswers = ORDER_SENTENCES.map(()=>[]);\n  orderScores = {};\n  const container = document.getElementById('order-container');\n  container.innerHTML = '';\n\n  ORDER_SENTENCES.forEach((sent, i) => {\n    const shuffled = shuffle(sent.words);\n    const card = document.createElement('div');\n    card.className = 'ex-card';\n    card.innerHTML = `\n      <div class=\"q-num\">جملة ${i+1}</div>\n      <div class=\"q-text\" style=\"direction:rtl;font-size:14px;color:#666;\">${sent.ar}</div>\n      <div class=\"answer-slots\" id=\"slots-${i}\"></div>\n      <div class=\"word-bank\" id=\"bank-${i}\"></div>\n      <div style=\"display:flex;gap:8px;\">\n        <button class=\"check-btn\" style=\"flex:1;\" onclick=\"checkOrder(${i})\">تحقق ✓</button>\n        <button class=\"check-btn\" style=\"flex:1;background:#888;\" onclick=\"clearOrder(${i})\">مسح</button>\n      </div>\n      <div class=\"order-result\" id=\"or-${i}\"></div>\n    `;\n    container.appendChild(card);\n\n    shuffled.forEach(word => {\n      const btn = document.createElement('button');\n      btn.className = 'word-chip';\n      btn.textContent = word;\n      btn.dataset.word = word;\n      btn.dataset.sentIdx = i;\n      btn.onclick = () => addWord(i, word, btn);\n      document.getElementById('bank-' + i).appendChild(btn);\n    });\n  });\n\n  document.getElementById('order-score').textContent = '0 / 6';\n  document.getElementById('order-progress').style.width = '0%';\n  document.getElementById('order-progress-label').textContent = '0 من 6 مكتملة';\n}\n\nfunction addWord(sentIdx, word, btn) {\n  if(btn.classList.contains('used')) return;\n  btn.classList.add('used');\n  orderAnswers[sentIdx].push(word);\n\n  const slot = document.createElement('button');\n  slot.className = 'answer-slot';\n  slot.textContent = word;\n  slot.dataset.word = word;\n  slot.onclick = () => removeWord(sentIdx, word, slot, btn);\n  document.getElementById('slots-' + sentIdx).appendChild(slot);\n}\n\nfunction removeWord(sentIdx, word, slot, originalBtn) {\n  const idx = orderAnswers[sentIdx].lastIndexOf(word);\n  if(idx > -1) orderAnswers[sentIdx].splice(idx, 1);\n  slot.remove();\n  originalBtn.classList.remove('used');\n}\n\nfunction checkOrder(sentIdx) {\n  const correct = ORDER_SENTENCES[sentIdx].words.join(' ');\n  const given = orderAnswers[sentIdx].join(' ');\n  const result = document.getElementById('or-' + sentIdx);\n  result.style.display = 'block';\n\n  if(given === correct) {\n    result.className = 'order-result ok';\n    result.textContent = '✅ صحيح! ' + correct;\n    if(!orderScores[sentIdx]) {\n      orderScores[sentIdx] = true;\n      const s = Object.keys(orderScores).length;\n      document.getElementById('order-score').textContent = s + ' / 6';\n      document.getElementById('order-progress').style.width = (s/6*100) + '%';\n      document.getElementById('order-progress-label').textContent = s + ' من 6 مكتملة';\n    }\n  } else {\n    result.className = 'order-result err';\n    result.textContent = '❌ الترتيب الصحيح: ' + correct;\n  }\n}\n\nfunction clearOrder(sentIdx) {\n  orderAnswers[sentIdx] = [];\n  document.getElementById('slots-' + sentIdx).innerHTML = '';\n  document.querySelectorAll(`[data-sent-idx=\"${sentIdx}\"]`).forEach(b => b.classList.remove('used'));\n  document.getElementById('or-' + sentIdx).style.display = 'none';\n}\n\nfunction resetOrder() { buildOrder(); }\n\nconst QUIZ_QUESTIONS = [\n  { q:\"„die Verabschiedung“ bedeutet:\", opts:[\"التحية\",\"الوداع\",\"التقديم\",\"السؤال\"], correct:1, explain:\"die Verabschiedung = الوداع، عكس die Begrüßung (التحية).\" },\n  { q:\"Welches Wort ist KEIN formeller Gruß?\", opts:[\"Guten Tag!\",\"Guten Abend!\",\"Tschüss!\",\"Auf Wiedersehen!\"], correct:2, explain:\"Tschüss! تحية وداع غير رسمية، بعكس الباقي الرسمية.\" },\n  { q:\"„Können Sie das bitte wiederholen?“ bedeutet:\", opts:[\"هل يمكنك أن تترجم ذلك؟\",\"هل يمكنك أن تكرر ذلك من فضلك؟\",\"هل يمكنك أن تكتب ذلك؟\",\"هل يمكنك أن تشرح ذلك؟\"], correct:1, explain:\"wiederholen = يكرر.\" },\n  { q:\"Welches Land hat „Tigrinya“ als Sprache?\", opts:[\"Ägypten\",\"Eritrea\",\"Marokko\",\"Tunesien\"], correct:1, explain:\"Tigrinya هي اللغة الرسمية في إريتريا.\" },\n  { q:\"„der Kurs“ bedeutet:\", opts:[\"الصف الدراسي / الدورة\",\"المعلم\",\"الكتاب\",\"الامتحان\"], correct:0, explain:\"der Kurs = الدورة التعليمية أو الصف.\" },\n  { q:\"Was sagt man, wenn man sich bedankt?\", opts:[\"Bitte schön!\",\"Vielen Dank!\",\"Entschuldigung!\",\"Auf Wiedersehen!\"], correct:1, explain:\"Vielen Dank! = شكراً جزيلاً.\" },\n];\n\nlet quizAnswers = {};\n\nfunction buildQuiz() {\n  quizAnswers = {};\n  const container = document.getElementById('quiz-container');\n  container.innerHTML = '';\n\n  QUIZ_QUESTIONS.forEach((q, i) => {\n    const card = document.createElement('div');\n    card.className = 'ex-card';\n    card.innerHTML = `\n      <div class=\"q-num\">سؤال ${i+1}</div>\n      <div class=\"q-text\">${q.q}</div>\n      <div id=\"qopts-${i}\" style=\"display:flex;flex-direction:column;gap:10px;\"></div>\n      <div class=\"feedback-text\" id=\"qfb-${i}\"></div>\n    `;\n    container.appendChild(card);\n\n    q.opts.forEach((opt, j) => {\n      const btn = document.createElement('button');\n      btn.style.cssText = 'display:block;width:100%;background:#F2F6FA;border:2px solid #E2E8F0;border-radius:12px;padding:13px 16px;font-size:15px;color:#1F4E79;text-align:right;direction:rtl;cursor:pointer;margin-bottom:0;transition:.2s;font-family:inherit;';\n      btn.textContent = opt;\n      btn.onclick = () => answerQuiz(i, j, btn);\n      document.getElementById('qopts-' + i).appendChild(btn);\n    });\n  });\n\n  document.getElementById('quiz-score').textContent = '0 / 6';\n  document.getElementById('quiz-progress').style.width = '0%';\n  document.getElementById('quiz-progress-label').textContent = '0 من 6 مكتملة';\n}\n\nfunction answerQuiz(qIdx, optIdx, btn) {\n  if(quizAnswers[qIdx] !== undefined) return;\n  quizAnswers[qIdx] = optIdx;\n\n  const q = QUIZ_QUESTIONS[qIdx];\n  const correct = optIdx === q.correct;\n  const allBtns = document.querySelectorAll(`#qopts-${qIdx} button`);\n\n  allBtns.forEach((b, j) => {\n    b.style.cursor = 'default';\n    if(j === q.correct) {\n      b.style.background = '#E6F4E8'; b.style.borderColor = '#2E9E5B'; b.style.color = '#1B6B3A'; b.style.fontWeight = '700';\n      b.textContent += ' ✓';\n    } else if(j === optIdx && !correct) {\n      b.style.background = '#FCEAEA'; b.style.borderColor = '#D64545'; b.style.color = '#A52E2E';\n      b.textContent += ' ✗';\n    }\n  });\n\n  const fb = document.getElementById('qfb-' + qIdx);\n  fb.style.display = 'block';\n  fb.style.background = '#F7F9FC'; fb.style.borderRight = '4px solid #7B61C9'; fb.style.borderRadius = '8px';\n  fb.style.padding = '12px 14px'; fb.style.fontSize = '14px'; fb.style.color = '#444';\n  fb.style.direction = 'rtl'; fb.style.lineHeight = '1.6';\n  fb.textContent = '💡 ' + q.explain;\n\n  if(correct && !quizAnswers[qIdx + '_scored']) {\n    quizAnswers[qIdx + '_scored'] = true;\n    const s = Object.keys(quizAnswers).filter(k=>k.endsWith('_scored')).length;\n    document.getElementById('quiz-score').textContent = s + ' / 6';\n    document.getElementById('quiz-progress').style.width = (s/6*100) + '%';\n    document.getElementById('quiz-progress-label').textContent = s + ' من 6 مكتملة';\n  }\n}\n\nfunction resetQuiz() { buildQuiz(); }\n\nbuildMatch();\nbuildOrder();\nbuildQuiz();\n<\/script>\n</body>\n</html>\n"}};
