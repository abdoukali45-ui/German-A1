<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1A1A1A">
<title>Elkali German A1</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #1A1A1A; --black-light: #2E2E2E; --cream: #FAF7F0; --cream-dim: #F0EAD9;
    --red: #D32F2F; --red-dark: #A82424; --yellow: #FBC02D; --yellow-dark: #E0A800;
    --text: #2A2620; --text-dim: #6B6457;
  }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  .flag-strip { display: flex; height: 6px; }
  .flag-strip span { flex: 1; }
  .flag-strip .b { background: var(--black); }
  .flag-strip .r { background: var(--red); }
  .flag-strip .y { background: var(--yellow); }
  .hero { background: linear-gradient(165deg, var(--black) 0%, var(--black-light) 100%); color: var(--cream); padding: 30px 20px 26px; position: relative; overflow: hidden; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; position: relative; z-index: 2; }
  .brand-wrap { display: flex; align-items: baseline; gap: 8px; }
  .brand-name { font-size: 30px; font-weight: 800; font-family: Georgia, 'Times New Roman', serif; color: var(--cream); }
  .brand-sub { font-size: 13px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
  .hero .by { font-size: 13px; color: rgba(250,247,240,.6); margin-top: 6px; }
  .student-badge { background: rgba(255,255,255,.08); border: 1.5px solid var(--yellow); border-radius: 14px; padding: 8px 12px; text-align: center; min-width: 64px; }
  .student-badge .num { font-size: 20px; font-weight: 800; color: var(--yellow); }
  .student-badge .lbl { font-size: 9px; color: rgba(250,247,240,.65); margin-top: 2px; }
  .book-strip { display: flex; gap: 3px; position: relative; z-index: 2; margin-top: 6px; }
  .page-tick { flex: 1; height: 24px; border-radius: 3px; background: rgba(255,255,255,.1); }
  .page-tick.done { background: var(--yellow); }
  .progress-caption { font-size: 12px; color: rgba(250,247,240,.7); margin-top: 10px; position: relative; z-index: 2; direction: rtl; }
  .progress-caption strong { color: var(--yellow); }
  .module-nav { display: flex; gap: 8px; padding: 16px 20px 4px; overflow-x: auto; background: var(--cream); position: sticky; top: 0; z-index: 50; border-bottom: 1px solid rgba(26,26,26,.08); }
  .module-chip { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--cream-dim); color: var(--text-dim); border: 1.5px solid transparent; transition: .2s; white-space: nowrap; }
  .module-chip.active { background: var(--black); color: var(--yellow); border-color: var(--black); }
  .content { padding: 18px 16px 80px; max-width: 560px; margin: 0 auto; }
  .module-block { margin-bottom: 28px; }
  .module-title { font-size: 13px; font-weight: 800; color: var(--red); letter-spacing: 1px; margin-bottom: 4px; padding: 0 4px; }
  .lesson-card { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; box-shadow: 0 2px 12px rgba(26,26,26,.07); border: 1px solid rgba(26,26,26,.05); cursor: pointer; transition: transform .15s; }
  .lesson-card:active { transform: scale(.98); }
  .lesson-card.locked { opacity: .5; cursor: default; }
  .lesson-num { width: 46px; height: 46px; border-radius: 12px; background: var(--black); color: var(--yellow); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; font-family: Georgia, serif; }
  .lesson-card.completed .lesson-num { background: var(--red); color: #fff; }
  .lesson-info { flex: 1; min-width: 0; }
  .lesson-title-de { font-size: 14px; font-weight: 700; color: var(--black); direction: ltr; text-align: right; line-height: 1.3; }
  .lesson-title-ar { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .lesson-status { font-size: 11px; margin-top: 4px; font-weight: 600; }
  .lesson-status.ready { color: #2E9E5B; }
  .lesson-status.soon { color: var(--text-dim); }
  .lesson-arrow { font-size: 18px; color: var(--text-dim); flex-shrink: 0; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid rgba(26,26,26,.08); display: flex; padding: 8px 0; box-shadow: 0 -4px 20px rgba(26,26,26,.06); z-index: 60; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: var(--text-dim); font-weight: 600; cursor: pointer; background: none; border: none; font-family: inherit; }
  .nav-item.active { color: var(--red); }
  .nav-icon { font-size: 19px; }
  .modal-sheet { position: fixed; bottom: 0; left: 0; right: 0; top: 0; background: var(--cream); z-index: 201; display: none; flex-direction: column; }
  .modal-sheet.show { display: flex; }
  .modal-header { background: var(--black); color: var(--yellow); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-size: 15px; font-weight: 700; }
  .modal-close { background: rgba(255,255,255,.15); border: none; color: var(--cream); width: 32px; height: 32px; border-radius: 50%; font-size: 16px; cursor: pointer; }
  .modal-body { flex: 1; overflow-y: auto; }
  .modal-body iframe { width: 100%; height: 100%; border: none; }
  .choice-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,26,.55); z-index: 150; align-items: center; justify-content: center; padding: 20px; }
  .choice-overlay.show { display: flex; }
  .choice-card { background: #fff; border-radius: 18px; padding: 24px 20px; max-width: 340px; width: 100%; text-align: center; border-top: 5px solid var(--yellow); }
  .choice-card h3 { color: var(--black); font-size: 17px; margin-bottom: 4px; }
  .choice-card p { color: var(--text-dim); font-size: 13px; margin-bottom: 18px; }
  .choice-btn { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; margin-bottom: 10px; cursor: pointer; font-family: inherit; }
  .choice-btn.quiz { background: var(--red); color: #fff; }
  .choice-btn.uebungen { background: var(--black); color: var(--yellow); }
  .choice-btn.cancel { background: var(--cream-dim); color: var(--text-dim); }
</style>
</head>
<body>

<div class="flag-strip"><span class="b"></span><span class="r"></span><span class="y"></span></div>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="brand-wrap"><span class="brand-name">Elkali</span></div>
      <div class="brand-sub">GERMAN A1</div>
      <div class="by">24 Lektionen · Momente A1 · Übungen تفاعلية</div>
    </div>
    <div class="student-badge">
      <div class="num" id="completedCount">0</div>
      <div class="lbl">دروس<br>مكتملة</div>
    </div>
  </div>
  <div class="book-strip" id="bookStrip"></div>
  <div class="progress-caption">استمر في رحلتك نحو <strong>A1 الكاملة</strong> 🇩🇪</div>
</div>

<div class="module-nav" id="moduleNav">
  <div class="module-chip active" data-module="all">الكل</div>
  <div class="module-chip" data-module="1">MODUL 1</div>
  <div class="module-chip" data-module="2">MODUL 2</div>
  <div class="module-chip" data-module="3">MODUL 3</div>
  <div class="module-chip" data-module="4">MODUL 4</div>
  <div class="module-chip" data-module="5">MODUL 5</div>
  <div class="module-chip" data-module="6">MODUL 6</div>
  <div class="module-chip" data-module="7">MODUL 7</div>
  <div class="module-chip" data-module="8">MODUL 8</div>
</div>

<div class="content" id="content"></div>

<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">📚</span> الدروس</button>
  <button class="nav-item"><span class="nav-icon">📖</span> المرجع</button>
  <button class="nav-item"><span class="nav-icon">📊</span> تقدمي</button>
  <button class="nav-item"><span class="nav-icon">ℹ️</span> حول</button>
</div>

<div class="choice-overlay" id="choiceOverlay">
  <div class="choice-card">
    <h3 id="choiceTitle">Lektion</h3>
    <p>اختر النشاط</p>
    <button class="choice-btn quiz" onclick="openContent('quiz')">🎡 الكويز (عجلة الحظ)</button>
    <button class="choice-btn uebungen" onclick="openContent('uebungen')">✏️ التمارين (4 أنواع)</button>
    <button class="choice-btn cancel" onclick="closeChoice()">إلغاء</button>
  </div>
</div>

<div class="modal-sheet" id="modalSheet">
  <div class="modal-header">
    <h2 id="modalTitle">عنوان</h2>
    <button class="modal-close" onclick="closeModal()">✕</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>

<script>
const LESSONS = [
  { n:1,  modul:1, de:"Ich heiße Miriam.",                               ar:"التعارف · التحيات · البلدان · الأبجدية" },
  { n:2,  modul:1, de:"Was macht ihr beruflich?",                        ar:"المهن · الأعداد · الحالة الاجتماعية" },
  { n:3,  modul:1, de:"Das ist meine Schwester.",                       ar:"العائلة · اللغات" },
  { n:4,  modul:2, de:"Das Bild ist so schön.",                         ar:"الأثاث · الأسعار · التقييم" },
  { n:5,  modul:2, de:"Ist das ein Tisch?",                             ar:"الأشياء · المواد · الألوان" },
  { n:6,  modul:2, de:"Wir haben einen Termin.",                        ar:"المكتب · التقنية · الهاتف" },
  { n:7,  modul:3, de:"Sie können super tanzen!",                       ar:"الهوايات · القدرات · التكرار" },
  { n:8,  modul:3, de:"Ich habe leider keine Zeit.",                    ar:"وقت الفراغ · المواعيد · الساعة" },
  { n:9,  modul:3, de:"Ich mag Hamburger.",                             ar:"الأطعمة · المطعم · الأكل" },
  { n:10, modul:4, de:"Wann kommst du denn an?",                        ar:"وسائل النقل · السفر · الأفعال المنفصلة" },
  { n:11, modul:4, de:"Was haben Sie gestern gemacht?",                 ar:"يوميات · الماضي التام مع haben" },
  { n:12, modul:4, de:"Im Frühling bin ich nach Hamburg gefahren.",      ar:"الفصول · الأعياد · الماضي التام مع sein" },
  { n:13, modul:5, de:"Berlin gefällt mir.",                            ar:"أماكن المدينة · es gibt · حالة الجر" },
  { n:14, modul:5, de:"Vor dem Kaufhaus nach rechts.",                  ar:"وصف الطريق · حروف الجر + Dativ" },
  { n:15, modul:5, de:"Ich finde ihr Zimmer schön.",                    ar:"السكن · السكن المشترك · sein/ihr" },
  { n:16, modul:6, de:"Wir haben hier ein Problem.",                    ar:"طلب المساعدة · المواعيد · in/vor/nach" },
  { n:17, modul:6, de:"Ich will … werden.",                             ar:"خطط المهنة · wollen · werden · mit/ohne" },
  { n:18, modul:6, de:"Ich soll diese Übung machen.",                   ar:"الصحة · الجسم · sollen · أمر Sie" },
  { n:19, modul:7, de:"Jetzt sei doch nicht gleich sauer!",             ar:"الأعمال المنزلية · أمر du/ihr · ضمائر Akk." },
  { n:20, modul:7, de:"Das Team sieht sehr sympathisch aus!",           ar:"المظهر · ماضٍ تام لأفعال غير منفصلة" },
  { n:21, modul:7, de:"Darf man das?",                                  ar:"القوانين · müssen/dürfen · صياغة un-" },
  { n:22, modul:8, de:"Mehr, mehr, mehr.",                              ar:"الملابس · المقارنة والتفضيل · welch-/dieser" },
  { n:23, modul:8, de:"Es regnet. Na und?",                            ar:"الطقس · السفر · denn · حروف جر متغيرة" },
  { n:24, modul:8, de:"Der erste Oktober war mein Glückstag!",          ar:"الأعياد · الأعداد الترتيبية · Konjunktiv II" },
];

let activeModule = "all";
let currentLesson = null;

function isReady(n) {
  return typeof CONTENT !== 'undefined' && CONTENT[String(n)] !== undefined;
}

function buildBookStrip() {
  const strip = document.getElementById('bookStrip');
  strip.innerHTML = '';
  LESSONS.forEach(function(l) {
    const tick = document.createElement('div');
    tick.className = 'page-tick' + (isReady(l.n) ? ' done' : '');
    strip.appendChild(tick);
  });
  document.getElementById('completedCount').textContent = LESSONS.filter(function(l){ return isReady(l.n); }).length;
}

function buildLessons() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const modules = [1,2,3,4,5,6,7,8];
  const modulTitles = {
    1: "MODUL 1 — Lektionen 1–3", 2: "MODUL 2 — Lektionen 4–6",
    3: "MODUL 3 — Lektionen 7–9", 4: "MODUL 4 — Lektionen 10–12",
    5: "MODUL 5 — Lektionen 13–15", 6: "MODUL 6 — Lektionen 16–18",
    7: "MODUL 7 — Lektionen 19–21", 8: "MODUL 8 — Lektionen 22–24"
  };

  modules.forEach(function(m) {
    if (activeModule !== "all" && activeModule !== String(m)) return;
    const block = document.createElement('div');
    block.className = 'module-block';
    block.innerHTML = '<div class="module-title">' + modulTitles[m] + '</div>';

    LESSONS.filter(function(l){ return l.modul === m; }).forEach(function(l) {
      const ready = isReady(l.n);
      const card = document.createElement('div');
      card.className = 'lesson-card' + (ready ? ' completed' : ' locked');
      const statusText = ready ? '✅ جاهز — كويز + تمارين' : '🔒 قريباً';
      const statusClass = ready ? 'ready' : 'soon';
      card.innerHTML =
        '<div class="lesson-num">' + l.n + '</div>' +
        '<div class="lesson-info">' +
          '<div class="lesson-title-de">' + l.de + '</div>' +
          '<div class="lesson-title-ar">' + l.ar + '</div>' +
          '<div class="lesson-status ' + statusClass + '">' + statusText + '</div>' +
        '</div>' +
        '<div class="lesson-arrow">' + (ready ? '◀' : '') + '</div>';
      if (ready) card.onclick = function() { openChoice(l); };
      block.appendChild(card);
    });
    content.appendChild(block);
  });
}

function openChoice(lesson) {
  currentLesson = lesson;
  document.getElementById('choiceTitle').textContent = 'Lektion ' + lesson.n + ' — ' + lesson.de;
  document.getElementById('choiceOverlay').classList.add('show');
}
function closeChoice() {
  document.getElementById('choiceOverlay').classList.remove('show');
}

function openContent(type) {
  closeChoice();
  const lessonContent = CONTENT[String(currentLesson.n)];
  if (!lessonContent || !lessonContent[type]) {
    alert('هذا المحتوى غير متوفر بعد لهذا الدرس.');
    return;
  }
  document.getElementById('modalTitle').textContent =
    'Lektion ' + currentLesson.n + ' — ' + (type === 'quiz' ? 'الكويز' : 'التمارين');
  const body = document.getElementById('modalBody');
  body.innerHTML = '<iframe id="contentFrame"></iframe>';
  const frame = document.getElementById('contentFrame');
  frame.srcdoc = lessonContent[type];
  document.getElementById('modalSheet').classList.add('show');
}

function closeModal() {
  document.getElementById('modalSheet').classList.remove('show');
  document.getElementById('modalBody').innerHTML = '';
}

document.getElementById('moduleNav').addEventListener('click', function(e) {
  const chip = e.target.closest('.module-chip');
  if (!chip) return;
  document.querySelectorAll('.module-chip').forEach(function(c) { c.classList.remove('active'); });
  chip.classList.add('active');
  activeModule = chip.dataset.module;
  buildLessons();
});

const CONTENT = {"1": {"quiz": "<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0\">\n<title>Glücksrad-Quiz — Lektion 1</title>\n<style>\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: linear-gradient(180deg, #F7F9FC 0%, #EEF3F9 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 28px 14px; }\n  .wrap { width: 100%; max-width: 480px; }\n  .eyebrow { text-align:center; font-size:13px; color:#2E75B6; font-weight:700; letter-spacing:1px; }\n  h1 { text-align: center; margin: 4px 0 2px; font-size: 26px; color: #1F4E79; font-weight: 800; font-style: italic; transform: skewX(-2deg); }\n  .subtitle { text-align:center; font-size:14px; color:#555; margin-bottom:20px; direction: rtl; }\n  .card { background:#fff; border-radius:20px; padding:30px 24px; text-align:center; box-shadow:0 8px 30px rgba(31,78,121,0.12); }\n  .dots { display:flex; justify-content:center; gap:10px; margin-bottom:18px; }\n  .dot { width:12px; height:12px; border-radius:50%; background:#D8E1EC; border:2px solid transparent; transition:.3s; }\n  .dot.done { background: var(--c); }\n  .dot.active { border-color: var(--c); }\n  .big-emoji { font-size:54px; margin-bottom:6px; }\n  p.lead { color:#666; font-size:15px; line-height:1.7; margin: 14px 0 22px; direction: rtl; }\n  button.primary { background:#1F4E79; color:#fff; border:none; border-radius:14px; padding:14px 34px; font-size:17px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(31,78,121,0.3); transition: transform .15s; }\n  button.primary:active { transform: scale(0.97); }\n  button.spin { background:#7B61C9; color:#fff; border:none; border-radius:14px; padding:14px 34px; font-size:17px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(123,97,201,.35); margin-top:8px; transition: transform .15s; }\n  button.spin:disabled { background:#A9BCCB; box-shadow:none; cursor:default; }\n  button.spin:active:not(:disabled) { transform: scale(0.97); }\n  .wheel-zone { position:relative; width:260px; height:260px; margin:0 auto 8px; }\n  .pointer { position:absolute; top:-13px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:13px solid transparent; border-right:13px solid transparent; border-top:20px solid #7B61C9; z-index:10; filter:drop-shadow(0 2px 2px rgba(0,0,0,.25)); }\n  svg#wheelSvg { transition: transform 2.8s cubic-bezier(.17,.67,.1,1); filter: drop-shadow(0 6px 18px rgba(31,78,121,.35)); }\n  .legend { display:flex; justify-content:center; gap:14px; margin:14px 0; flex-wrap:wrap; font-size:13px; color:#555; }\n  .legend span.sw { width:10px; height:10px; border-radius:50%; display:inline-block; margin-left:5px; }\n  .score-line { margin-top:14px; font-size:14px; color:#888; }\n  .score-line strong { color:#1F4E79; }\n  .quiz-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }\n  .pill { color:#fff; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:700; }\n  .qcount { font-size:13px; color:#888; }\n  h3.question { color:#1F4E79; font-size:18px; line-height:1.5; margin-bottom:18px; text-align:right; }\n  .opt { display:block; width:100%; background:#F2F6FA; border:2px solid #E2E8F0; border-radius:12px; padding:13px 16px; font-size:15px; color:#1F4E79; text-align:right; direction:rtl; cursor:pointer; margin-bottom:10px; transition:.2s; font-family:inherit; }\n  .opt.correct { background:#E6F4E8; border-color:#2E9E5B; color:#1B6B3A; font-weight:700; }\n  .opt.wrong { background:#FCEAEA; border-color:#D64545; color:#A52E2E; font-weight:700; }\n  .opt:disabled { cursor:default; }\n  .explain { margin-top:14px; background:#F7F9FC; border-right:4px solid #2E75B6; border-radius:8px; padding:12px 14px; font-size:14px; color:#444; line-height:1.6; text-align:right; display:none; }\n  .streak-msg { margin-top:10px; font-size:13px; color:#7B61C9; font-weight:700; text-align:center; display:none; }\n  button.next { margin-top:16px; width:100%; background:#1F4E79; color:#fff; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; cursor:pointer; display:none; }\n  .result-emoji { font-size:58px; margin-bottom:2px; }\n  h2.result-title { color:#1F4E79; font-size:21px; margin-bottom:6px; }\n  .result-msg { font-size:15px; color:#666; margin-bottom:18px; direction:rtl; }\n  .score-box { background:#F7F9FC; border-radius:16px; padding:18px; margin-bottom:18px; }\n  .score-box .num { font-size:40px; font-weight:800; color:#1F4E79; }\n  .score-box .pct { font-size:14px; color:#888; margin-top:2px; }\n  .score-box .streak { margin-top:12px; font-size:13px; color:#666; }\n  .screen { display:none; }\n  .screen.active { display:block; }\n  footer { text-align:center; margin-top:18px; font-size:12px; color:#A0AAB8; }\n</style>\n</head>\n<body>\n<div class=\"wrap\">\n  <div class=\"eyebrow\">LEKTION 1</div>\n  <h1>Glücksrad-Quiz 🎡</h1>\n  <div class=\"subtitle\">عجلة الحظ — Begrüßung · Vorstellung · Länder · Alphabet</div>\n  <div class=\"dots\" id=\"dots\" style=\"display:none;\"></div>\n  <div class=\"screen active card\" id=\"screen-start\">\n    <div class=\"big-emoji\">🎡</div>\n    <h2 style=\"color:#1F4E79;font-size:20px;margin-bottom:8px;\">مرحباً بك في كويز الدرس 1!</h2>\n    <p class=\"lead\">أدر عجلة الحظ لتختار فئة أسئلة، أجب بسرعة، واجمع أكبر عدد من النقاط.</p>\n    <button class=\"primary\" onclick=\"goWheel()\">ابدأ اللعب</button>\n  </div>\n  <div class=\"screen card\" id=\"screen-wheel\">\n    <div class=\"wheel-zone\">\n      <div class=\"pointer\"></div>\n      <svg id=\"wheelSvg\" viewBox=\"0 0 200 200\" width=\"260\" height=\"260\"></svg>\n    </div>\n    <div class=\"legend\" id=\"legend\"></div>\n    <button class=\"spin\" id=\"spinBtn\" onclick=\"spinWheel()\">أدر العجلة!</button>\n    <div class=\"score-line\">النقاط الحالية: <strong id=\"liveScore\">0</strong> / <span id=\"liveTotal\">0</span></div>\n  </div>\n  <div class=\"screen card\" id=\"screen-quiz\">\n    <div class=\"quiz-top\"><div class=\"pill\" id=\"catPill\"></div><div class=\"qcount\" id=\"qCount\"></div></div>\n    <h3 class=\"question\" id=\"qText\"></h3>\n    <div id=\"optsZone\"></div>\n    <div class=\"explain\" id=\"explainBox\"></div>\n    <div class=\"streak-msg\" id=\"streakMsg\"></div>\n    <button class=\"next\" id=\"nextBtn\" onclick=\"nextQuestion()\">السؤال التالي ←</button>\n  </div>\n  <div class=\"screen card\" id=\"screen-result\">\n    <div class=\"result-emoji\" id=\"resultEmoji\"></div>\n    <h2 class=\"result-title\" id=\"resultTitle\"></h2>\n    <div class=\"result-msg\" id=\"resultMsg\"></div>\n    <div class=\"score-box\"><div class=\"num\" id=\"finalScore\"></div><div class=\"pct\" id=\"finalPct\"></div></div>\n    <div id=\"grade-box\" style=\"margin:14px 0;padding:16px;border-radius:14px;font-size:22px;font-weight:800;text-align:center;\"></div>\n    <button class=\"primary\" onclick=\"restart()\">العب مرة أخرى 🎡</button>\n  </div>\n  <footer>Momente A1 · Lektion 1 — Ich heiße Miriam.</footer>\n</div>\n<script>\nconst CATEGORIES=[{id:\"vorstellung\",label:\"Vorstellung\",color:\"#1F4E79\",emoji:\"🙋\"},{id:\"befinden\",label:\"Befinden\",color:\"#2E75B6\",emoji:\"😊\"}];\nconst QUESTIONS={vorstellung:[{q:\"Wie heißt du?\",options:[\"Ich heiße Miriam.\",\"Ich bin 20.\",\"Gut.\",\"Ja.\"],correct:0,explain:\"Wie heißt du؟ يُجاب عنه بـ Ich heiße...\"}],befinden:[{q:\"Wie geht's?\",options:[\"Gut, danke!\",\"Ich heiße Tom.\",\"Aus Berlin.\",\"Nein.\"],correct:0,explain:\"رد بسيط عن الحال.\"}]};\nlet activeCategory=null,qIndex=0,score=0,totalAnswered=0;\nfunction show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}\nfunction goWheel(){activeCategory='vorstellung';qIndex=0;loadQuestion();show('screen-quiz');}\nfunction loadQuestion(){const q=QUESTIONS[activeCategory][qIndex];document.getElementById('catPill').textContent=activeCategory;document.getElementById('qCount').textContent=(qIndex+1)+'/'+QUESTIONS[activeCategory].length;document.getElementById('qText').textContent=q.q;const zone=document.getElementById('optsZone');zone.innerHTML='';q.options.forEach((opt,i)=>{const btn=document.createElement('button');btn.className='opt';btn.textContent=opt;btn.onclick=()=>answer(i);zone.appendChild(btn);});document.getElementById('explainBox').style.display='none';document.getElementById('nextBtn').style.display='none';}\nfunction answer(idx){const q=QUESTIONS[activeCategory][qIndex];totalAnswered++;if(q.correct===idx)score++;const eb=document.getElementById('explainBox');eb.textContent='💡 '+q.explain;eb.style.display='block';document.getElementById('nextBtn').style.display='block';}\nfunction nextQuestion(){qIndex++;if(qIndex<QUESTIONS[activeCategory].length){loadQuestion();}else{showResult();}}\nfunction showResult(){document.getElementById('resultEmoji').textContent='🏆';document.getElementById('resultTitle').textContent='Fertig!';document.getElementById('resultMsg').textContent='أحسنت!';document.getElementById('finalScore').textContent=score+'/'+totalAnswered;document.getElementById('finalPct').textContent='';document.getElementById('grade-box').textContent='ممتاز';show('screen-result');}\nfunction restart(){score=0;totalAnswered=0;qIndex=0;show('screen-start');}\nfunction spinWheel(){goWheel();}\n<\/script>\n</body>\n</html>\n", "uebungen": "<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"UTF-8\">\n<title>Übungen — Lektion 1</title>\n<style>\n body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#F7F9FC;padding:20px;}\n .ex-card{background:#fff;border-radius:14px;padding:18px 16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(31,78,121,.07);}\n .blank-input{border:2px solid #D8E4F0;border-radius:8px;padding:10px 12px;font-size:15px;width:100%;direction:ltr;}\n .check-btn{margin-top:10px;width:100%;background:#1F4E79;color:#fff;border:none;border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}\n .feedback-text{margin-top:8px;font-size:13px;display:none;direction:rtl;}\n .feedback-text.ok{color:#1B6B3A;}\n .feedback-text.err{color:#A52E2E;}\n</style>\n</head>\n<body>\n<h2 style=\"color:#1F4E79;text-align:center;\">تمارين الدرس 1</h2>\n<div class=\"ex-card\">\n  <div>___ ist Ihr Name? — Mein Name ist Klaus.</div>\n  <input class=\"blank-input\" id=\"f1\" placeholder=\"أكمل الفراغ...\">\n  <button class=\"check-btn\" onclick=\"checkFill('f1','Wie','fb1')\">تحقق ✓</button>\n  <div class=\"feedback-text\" id=\"fb1\"></div>\n</div>\n<script>\nfunction checkFill(inputId,answer,fbId){const input=document.getElementById(inputId);const fb=document.getElementById(fbId);const correct=input.value.trim().toLowerCase()===answer.toLowerCase();fb.style.display='block';fb.className='feedback-text '+(correct?'ok':'err');fb.textContent=correct?'✅ صحيح!':'❌ الإجابة الصحيحة: '+answer;}\n<\/script>\n</body>\n</html>\n"}};
