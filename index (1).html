<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#16365C">
<title>Deutsch A1 — رحلتي في الألمانية</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #16365C;
    --ink-light: #2C5078;
    --paper: #FBF7EE;
    --paper-dim: #F1EBDC;
    --garnet: #A8324A;
    --gold: #C49A4A;
    --text: #2A2620;
    --text-dim: #6B6457;
  }
  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--paper);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(165deg, var(--ink) 0%, var(--ink-light) 100%);
    color: var(--paper);
    padding: 36px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute;
    top: -40%; left: -10%;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(196,154,74,.18), transparent 70%);
    border-radius: 50%;
  }
  .hero-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 18px; position: relative; z-index: 2;
  }
  .brand-mark {
    font-size: 11px; letter-spacing: 2.5px; color: var(--gold);
    font-weight: 700; margin-bottom: 6px;
  }
  .hero h1 {
    font-size: 30px; font-weight: 800; line-height: 1.15;
    font-family: Georgia, 'Times New Roman', serif;
  }
  .hero .by {
    font-size: 13px; color: rgba(251,247,238,.65); margin-top: 6px;
  }
  .student-badge {
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
    border-radius: 14px; padding: 8px 12px; text-align: center; min-width: 64px;
  }
  .student-badge .num { font-size: 20px; font-weight: 800; color: var(--gold); }
  .student-badge .lbl { font-size: 9px; color: rgba(251,247,238,.6); margin-top: 2px; }

  /* ── PROGRESS BOOK STRIP ── */
  .book-strip {
    display: flex; gap: 3px; position: relative; z-index: 2; margin-top: 8px;
  }
  .page-tick {
    flex: 1; height: 26px; border-radius: 3px;
    background: rgba(255,255,255,.12);
    position: relative; cursor: pointer;
    transition: transform .15s;
  }
  .page-tick.done { background: var(--gold); }
  .page-tick.current {
    background: var(--garnet);
    box-shadow: 0 0 0 2px rgba(251,247,238,.4);
  }
  .progress-caption {
    font-size: 12px; color: rgba(251,247,238,.75); margin-top: 10px;
    position: relative; z-index: 2; direction: rtl;
  }
  .progress-caption strong { color: var(--gold); }

  /* ── MODULE NAV ── */
  .module-nav {
    display: flex; gap: 8px; padding: 16px 20px 4px;
    overflow-x: auto; background: var(--paper);
    position: sticky; top: 0; z-index: 50;
    border-bottom: 1px solid rgba(22,54,92,.08);
  }
  .module-chip {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    background: var(--paper-dim); color: var(--text-dim);
    border: 1.5px solid transparent; transition: .2s; white-space: nowrap;
  }
  .module-chip.active {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }

  /* ── LESSON LIST ── */
  .content { padding: 18px 16px 80px; max-width: 560px; margin: 0 auto; }
  .module-block { margin-bottom: 28px; }
  .module-title {
    font-size: 13px; font-weight: 800; color: var(--garnet);
    letter-spacing: 1px; margin-bottom: 4px; padding: 0 4px;
  }
  .module-sub {
    font-size: 12px; color: var(--text-dim); margin-bottom: 12px; padding: 0 4px;
  }

  .lesson-card {
    background: #fff; border-radius: 14px; padding: 16px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 12px rgba(22,54,92,.07);
    border: 1px solid rgba(22,54,92,.05);
    text-decoration: none; color: inherit;
    transition: transform .15s, box-shadow .15s;
  }
  .lesson-card:active { transform: scale(.98); }
  .lesson-card.locked { opacity: .5; }
  .lesson-card.locked .lesson-num { background: var(--paper-dim); color: var(--text-dim); }

  .lesson-num {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--ink); color: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; flex-shrink: 0;
    font-family: Georgia, serif;
  }
  .lesson-card.completed .lesson-num { background: var(--garnet); color: #fff; }

  .lesson-info { flex: 1; min-width: 0; }
  .lesson-title-de {
    font-size: 14px; font-weight: 700; color: var(--ink);
    direction: ltr; text-align: right; line-height: 1.3;
  }
  .lesson-title-ar {
    font-size: 12px; color: var(--text-dim); margin-top: 2px;
  }
  .lesson-status {
    font-size: 11px; margin-top: 4px; font-weight: 600;
  }
  .lesson-status.done { color: var(--garnet); }
  .lesson-status.ready { color: #2E9E5B; }
  .lesson-status.soon { color: var(--text-dim); }

  .lesson-arrow {
    font-size: 18px; color: var(--text-dim); flex-shrink: 0;
  }

  .badge-types {
    display: flex; gap: 5px; margin-top: 6px;
  }
  .type-pill {
    font-size: 10px; padding: 2px 7px; border-radius: 8px;
    background: var(--paper-dim); color: var(--ink-light); font-weight: 700;
  }

  /* ── EMPTY/SOON STATE ── */
  .coming-soon-card {
    background: var(--paper-dim); border: 2px dashed rgba(22,54,92,.15);
    border-radius: 14px; padding: 16px; text-align: center;
    font-size: 13px; color: var(--text-dim); margin-bottom: 10px;
  }

  /* ── FOOTER NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid rgba(22,54,92,.08);
    display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 20px rgba(22,54,92,.06);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; font-size: 11px; color: var(--text-dim); font-weight: 600;
    cursor: pointer; background: none; border: none; font-family: inherit;
  }
  .nav-item.active { color: var(--garnet); }
  .nav-icon { font-size: 19px; }

  .install-banner {
    display: none;
    background: var(--gold); color: var(--ink); padding: 10px 16px;
    font-size: 13px; text-align: center; font-weight: 700;
    direction: rtl;
  }
  .install-banner.show { display: block; }
  .install-banner button {
    background: var(--ink); color: var(--gold); border: none;
    border-radius: 8px; padding: 4px 12px; font-size: 12px;
    margin-right: 8px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>

<div class="install-banner" id="installBanner">
  📲 ثبّت التطبيق على هاتفك <button onclick="installApp()">تثبيت</button>
</div>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="brand-mark">DEUTSCH A1 · MOMENTE</div>
      <h1>رحلتي في الألمانية</h1>
      <div class="by">24 Lektionen · مع Übungen تفاعلية</div>
    </div>
    <div class="student-badge">
      <div class="num" id="completedCount">2</div>
      <div class="lbl">دروس<br>مكتملة</div>
    </div>
  </div>
  <div class="book-strip" id="bookStrip"></div>
  <div class="progress-caption">أنت في <strong>الصفحة <span id="currentPageLabel">12</span></strong> من <strong>24</strong> — استمر! 🎯</div>
</div>

<div class="module-nav" id="moduleNav">
  <div class="module-chip active" data-module="all">الكل</div>
  <div class="module-chip" data-module="1">MODUL 1</div>
  <div class="module-chip" data-module="2">MODUL 2</div>
  <div class="module-chip" data-module="3">MODUL 3</div>
  <div class="module-chip" data-module="4">MODUL 4</div>
  <div class="module-chip" data-module="5">MODUL 5</div>
  <div class="module-chip" data-module="6">MODUL 6</div>
  <div class="module-chip" data-module="7">MODUL 7</div>
  <div class="module-chip" data-module="8">MODUL 8</div>
</div>

<div class="content" id="content"></div>

<div class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">📚</span> الدروس
  </button>
  <button class="nav-item" onclick="alert('قريباً: المرجع الكامل PDF')">
    <span class="nav-icon">📖</span> المرجع
  </button>
  <button class="nav-item" onclick="alert('قريباً: إحصائيات تقدمك')">
    <span class="nav-icon">📊</span> تقدمي
  </button>
  <button class="nav-item" onclick="alert('قريباً: معلومات عن التطبيق')">
    <span class="nav-icon">ℹ️</span> حول
  </button>
</div>

<script>
// ════════════════════════════════════
// بيانات الدروس — Momente A1 (24 ليكتيون)
// ════════════════════════════════════
const LESSONS = [
  { n:1, modul:1, de:"Ich heiße Miriam.", ar:"التعارف والترحيب", status:"soon" },
  { n:2, modul:1, de:"Was macht ihr beruflich?", ar:"المهن", status:"soon" },
  { n:3, modul:1, de:"Das ist meine Schwester.", ar:"العائلة واللغات", status:"ready", quiz:"Lektion3_Quiz.html", uebungen:"Lektion3_Uebungen.html" },
  { n:4, modul:2, de:"Mein Mann und ich.", ar:"السكن والأثاث", status:"soon" },
  { n:5, modul:2, de:"Ich brauche ein Bett.", ar:"وصف الشقة", status:"soon" },
  { n:6, modul:2, de:"Ich sehe etwas, was du nicht siehst.", ar:"لعبة التخمين", status:"soon" },
  { n:7, modul:3, de:"Ich möchte gern Mechaniker werden.", ar:"المهن والمستقبل", status:"soon" },
  { n:8, modul:3, de:"Termine.", ar:"المواعيد والوقت", status:"soon" },
  { n:9, modul:3, de:"Im Café.", ar:"الطعام والمطعم", status:"soon" },
  { n:10, modul:4, de:"Ein Tag in Konstanz.", ar:"الرحلات وتعبير المشاعر", status:"soon" },
  { n:11, modul:4, de:"Sie können das so machen.", ar:"النصائح والاتجاهات", status:"soon" },
  { n:12, modul:4, de:"Im Frühling bin ich nach Hamburg gefahren.", ar:"الفصول والمهرجانات والسفر", status:"ready", quiz:"Lektion12_Quiz.html", uebungen:"Lektion12_Uebungen.html" },
  { n:13, modul:5, de:"Berlin gefällt mir.", ar:"المدينة والأماكن", status:"soon" },
  { n:14, modul:5, de:"Vor dem Kaufhaus nach rechts.", ar:"وصف الطريق", status:"soon" },
  { n:15, modul:5, de:"Ich finde ihr Zimmer schön.", ar:"السكن المشترك", status:"soon" },
  { n:16, modul:6, de:"Wir haben hier ein Problem.", ar:"طلب المساعدة", status:"soon" },
  { n:17, modul:6, de:"Ich will … werden.", ar:"خطط المستقبل المهنية", status:"soon" },
  { n:18, modul:6, de:"Ich soll diese Übung machen.", ar:"الصحة والجسم", status:"soon" },
  { n:19, modul:7, de:"Jetzt sei doch nicht gleich sauer!", ar:"الأعمال المنزلية", status:"soon" },
  { n:20, modul:7, de:"Das Team sieht sehr sympathisch aus!", ar:"الوصف الشخصي", status:"soon" },
  { n:21, modul:7, de:"Darf man das?", ar:"القوانين والقواعد", status:"soon" },
  { n:22, modul:8, de:"Mehr, mehr, mehr.", ar:"الملابس والمقارنة", status:"soon" },
  { n:23, modul:8, de:"Es regnet. Na und?", ar:"الطقس والرحلات", status:"soon" },
  { n:24, modul:8, de:"Der erste Oktober war mein Glückstag!", ar:"الأعياد والتمنيات", status:"ready", quiz:"Lektion24_Quiz.html", uebungen:"Lektion24_Uebungen.html" },
];

let activeModule = "all";

// ── بناء شريط التقدم ──
function buildBookStrip() {
  const strip = document.getElementById('bookStrip');
  strip.innerHTML = '';
  LESSONS.forEach(l => {
    const tick = document.createElement('div');
    tick.className = 'page-tick';
    if (l.status === 'ready') tick.classList.add('done');
    strip.appendChild(tick);
  });
  const doneCount = LESSONS.filter(l => l.status === 'ready').length;
  document.getElementById('completedCount').textContent = doneCount;
}

// ── بناء قائمة الدروس ──
function buildLessons() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  const modules = [1,2,3,4,5,6,7,8];
  const modulTitles = {
    1: "MODUL 1 — Lektionen 1–3", 2: "MODUL 2 — Lektionen 4–6",
    3: "MODUL 3 — Lektionen 7–9", 4: "MODUL 4 — Lektionen 10–12",
    5: "MODUL 5 — Lektionen 13–15", 6: "MODUL 6 — Lektionen 16–18",
    7: "MODUL 7 — Lektionen 19–21", 8: "MODUL 8 — Lektionen 22–24",
  };

  modules.forEach(m => {
    if (activeModule !== "all" && activeModule !== String(m)) return;

    const block = document.createElement('div');
    block.className = 'module-block';
    block.innerHTML = `<div class="module-title">${modulTitles[m]}</div>`;

    const lessonsInModule = LESSONS.filter(l => l.modul === m);
    lessonsInModule.forEach(l => {
      const card = document.createElement('a');
      card.className = 'lesson-card' + (l.status === 'ready' ? ' completed' : ' locked');
      card.href = l.status === 'ready' ? '#' : 'javascript:void(0)';
      if (l.status === 'ready') {
        card.onclick = (e) => { e.preventDefault(); openLesson(l); };
      } else {
        card.onclick = (e) => { e.preventDefault(); };
      }

      const statusText = l.status === 'ready' ? '✅ جاهز — كويز + تمارين' : '🔒 قريباً';
      const statusClass = l.status === 'ready' ? 'ready' : 'soon';

      card.innerHTML = `
        <div class="lesson-num">${l.n}</div>
        <div class="lesson-info">
          <div class="lesson-title-de">${l.de}</div>
          <div class="lesson-title-ar">${l.ar}</div>
          <div class="lesson-status ${statusClass}">${statusText}</div>
        </div>
        <div class="lesson-arrow">${l.status === 'ready' ? '◀' : ''}</div>
      `;
      block.appendChild(card);
    });

    content.appendChild(block);
  });
}

function openLesson(lesson) {
  const choice = confirm(`Lektion ${lesson.n} — ${lesson.ar}\n\nاضغط "موافق" لفتح الكويز 🎡\nاضغط "إلغاء" لفتح التمارين ✏️`);
  if (choice) {
    window.location.href = lesson.quiz;
  } else {
    window.location.href = lesson.uebungen;
  }
}

// ── فلترة الموديولات ──
document.getElementById('moduleNav').addEventListener('click', (e) => {
  const chip = e.target.closest('.module-chip');
  if (!chip) return;
  document.querySelectorAll('.module-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeModule = chip.dataset.module;
  buildLessons();
});

// ── PWA Install ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      document.getElementById('installBanner').classList.remove('show');
    });
  }
}

// ── Service worker registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// ── Init ──
buildBookStrip();
buildLessons();
</script>
</body>
</html>
